<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>夢回花深處｜教學與公告</title>

  <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzOJ5c0386XX_6Nc30CH9okPokvMTOGA9BhpgeuKTS_CyC4_QO3OITuVe4&s=10">

  <script>
    (function(){
      try{
        const saved = localStorage.getItem("wwm-docs-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
      }catch(error){
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

  <style>
    :root{
      --bg:#0b1020;
      --panel:rgba(17,25,48,.86);
      --panel-soft:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --border-soft:rgba(255,255,255,.18);
      --text:#eef2ff;
      --muted:#a8b3cf;
      --link:#7db5ff;
      --green:#34d399;
      --green-soft:rgba(52,211,153,.12);
      --orange:#fbbf24;
      --orange-soft:rgba(251,191,36,.12);
      --red:#ff6b81;
      --red-soft:rgba(255,107,129,.12);
      --purple:#a78bfa;
      --purple-soft:rgba(139,92,246,.14);
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --site-sea:#6ea8ff;
      --site-teal:#8b5cf6;
      --site-ice:#60a5fa;
      --site-warm:#f59e0b;
      --sidebar:286px;
      --toc:230px;
      --max:1500px;
    }


    html[data-theme="dark"]{
      --bg:#0b1020;
      --panel:rgba(17,25,48,.90);
      --panel-soft:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --border-soft:rgba(255,255,255,.18);
      --text:#eef2ff;
      --muted:#a8b3cf;
      --link:#7db5ff;
      --green:#34d399;
      --green-soft:rgba(52,211,153,.12);
      --orange:#fbbf24;
      --orange-soft:rgba(251,191,36,.12);
      --red:#ff6b81;
      --red-soft:rgba(255,107,129,.12);
      --purple:#a78bfa;
      --purple-soft:rgba(139,92,246,.14);
      --shadow:0 18px 40px rgba(0,0,0,.32);
      --site-sea:#6ea8ff;
      --site-teal:#8b5cf6;
      --site-ice:#60a5fa;
      --site-warm:#f59e0b;
    }


    html[data-theme="light"]{
      --bg:#eef3fb;
      --panel:rgba(255,255,255,.86);
      --panel-soft:rgba(91,120,180,.08);
      --border:rgba(67,89,130,.16);
      --border-soft:rgba(67,89,130,.22);
      --text:#17233c;
      --muted:#64748b;
      --link:#2563eb;
      --green:#059669;
      --green-soft:rgba(16,185,129,.11);
      --orange:#b7791f;
      --orange-soft:rgba(245,158,11,.11);
      --red:#dc3958;
      --red-soft:rgba(255,107,129,.10);
      --purple:#7c3aed;
      --purple-soft:rgba(139,92,246,.11);
      --shadow:0 18px 40px rgba(65,86,125,.16);
      --site-sea:#4f8ef7;
      --site-teal:#7c3aed;
      --site-ice:#60a5fa;
      --site-warm:#f59e0b;
    }


    .themeToggle{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:38px;
      padding:0 12px;
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--text);
      background:var(--panel);
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
      transition:.16s ease;
    }

    .themeToggle:hover{
      color:var(--link);
      border-color:var(--link);
      transform:translateY(-1px);
    }

    .themeIcon{
      font-size:16px;
      line-height:1;
    }

    *{ box-sizing:border-box; }

    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:var(--bg);
      font-family:"Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    button,input{ font:inherit; }
    a{ color:var(--link); }

    .topbar{
      color:var(--text);
      position:sticky;
      top:0;
      z-index:1000;
      min-height:64px;
      display:flex;
      align-items:center;
      gap:16px;
      padding:10px 20px;
      border-bottom:1px solid var(--border);
      background:color-mix(in srgb, var(--panel) 96%, transparent);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:max-content;
      color:var(--text);
      text-decoration:none;
      font-weight:800;
    }

    .brand img{
      width:34px;
      height:34px;
      border-radius:8px;
      object-fit:cover;
      border:1px solid var(--border);
    }

    .brandText{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:14px;
    }

    .brandText .slash{ color:var(--muted); font-weight:500; }
    .brandText strong{ font-weight:800; }

    .searchWrap{
      flex:1;
      max-width:680px;
      margin-left:auto;
      position:relative;
    }

    .searchInput{
      width:100%;
      height:38px;
      padding:0 42px 0 36px;
      border:1px solid var(--border);
      border-radius:7px;
      color:var(--text);
      background:var(--panel-soft);
      outline:none;
      transition:.15s ease;
    }

    .searchInput:focus{
      border-color:#54aeff;
      background:var(--panel);
      box-shadow:0 0 0 3px rgba(84,174,255,.25);
    }

    .searchIcon{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted);
      pointer-events:none;
    }

    .searchKey{
      position:absolute;
      right:9px;
      top:50%;
      transform:translateY(-50%);
      padding:2px 7px;
      border:1px solid var(--border);
      border-radius:5px;
      color:var(--muted);
      background:var(--panel);
      font-size:11px;
      font-weight:700;
    }

    .topLink{
      color:var(--text);
      text-decoration:none;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }

    .topLink:hover{ color:var(--link); }

    .mobileMenuBtn{
      display:none;
      width:38px;
      height:38px;
      border:1px solid var(--border);
      border-radius:7px;
      background:var(--panel);
      cursor:pointer;
    }

    .layout{
      width:min(100%, var(--max));
      margin:0 auto;
      display:grid;
      grid-template-columns:var(--sidebar) minmax(0,1fr) var(--toc);
      min-height:calc(100vh - 64px);
    }

    .sidebar{
      color:var(--text);
      position:sticky;
      top:64px;
      height:calc(100vh - 64px);
      overflow:auto;
      padding:24px 18px 40px;
      border-right:1px solid var(--border);
      background:var(--panel);
    }

    .sidebarTitle{
      margin:0 0 14px;
      padding:0 8px;
      font-size:13px;
      font-weight:800;
    }

    .sidebarMeta{
      margin:0 8px 18px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    .docList{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .docItem{
      display:flex;
      align-items:flex-start;
      gap:9px;
      width:100%;
      padding:9px 10px;
      border:0;
      border-radius:7px;
      color:var(--text);
      background:transparent;
      text-align:left;
      cursor:pointer;
      font-size:13px;
      line-height:1.45;
    }

    .docItem:hover{ background:var(--panel-soft); }

    .docItem.active{
      color:#fff;
      background:#0969da;
      font-weight:700;
    }

    .docIcon{
      margin-top:1px;
      flex:0 0 auto;
      opacity:.8;
    }

    .docName{
      min-width:0;
      overflow-wrap:anywhere;
    }

    .statusBox{
      margin:14px 8px 0;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:7px;
      color:var(--muted);
      background:var(--panel-soft);
      font-size:12px;
      line-height:1.55;
    }

    .content{
    padding:34px clamp(24px,4vw,64px) 80px;
    overflow-y: auto;
    height: calc(100vh - 118px);
}

    .docHeader{
      margin-bottom:24px;
      padding-bottom:18px;
      border-bottom:1px solid var(--border);
    }

    .breadcrumb{
      display:flex;
      align-items:center;
      gap:7px;
      margin-bottom:12px;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .docTitle{
      margin:0;
      font-size:32px;
      line-height:1.25;
      letter-spacing:-.025em;
      font-weight:800;
    }

    .docFile{
      margin-top:9px;
      color:var(--muted);
      font-size:12px;
    }

    .markdownBody{
      max-width:920px;
      font-size:15px;
      line-height:1.78;
      word-wrap:break-word;
    }

    .markdownBody > :first-child{ margin-top:0; }
    .markdownBody > :last-child{ margin-bottom:0; }

    .markdownBody h1,
    .markdownBody h2,
    .markdownBody h3,
    .markdownBody h4{
      scroll-margin-top:86px;
      line-height:1.3;
      font-weight:800;
    }

    .markdownBody h1{
      margin:0 0 22px;
      padding-bottom:10px;
      border-bottom:1px solid var(--border);
      font-size:30px;
    }

    .markdownBody h2{
      margin:38px 0 16px;
      padding-bottom:8px;
      border-bottom:1px solid var(--border);
      font-size:23px;
    }

    .markdownBody h3{
      margin:28px 0 12px;
      font-size:19px;
    }

    .markdownBody p{ margin:0 0 16px; }

    .markdownBody ul,
    .markdownBody ol{
      margin:0 0 16px;
      padding-left:28px;
    }

    .markdownBody li + li{ margin-top:5px; }

    .markdownBody blockquote{
      margin:18px 0;
      padding:10px 16px;
      border-left:4px solid var(--border);
      color:var(--muted);
      background:var(--panel-soft);
    }

    .markdownBody code{
      padding:.18em .38em;
      border-radius:5px;
      background:color-mix(in srgb, var(--muted) 22%, transparent);
      font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;
      font-size:85%;
    }

    .markdownBody pre{
      overflow:auto;
      margin:18px 0;
      padding:16px;
      border:1px solid var(--border);
      border-radius:7px;
      background:var(--panel-soft);
      line-height:1.5;
    }

    .markdownBody pre code{
      padding:0;
      background:transparent;
      font-size:13px;
    }

    .markdownBody table{
      width:100%;
      display:block;
      overflow:auto;
      border-collapse:collapse;
      margin:18px 0;
    }

    .markdownBody th,
    .markdownBody td{
      padding:8px 12px;
      border:1px solid var(--border);
      text-align:left;
    }

    .markdownBody tr:nth-child(2n){ background:var(--panel-soft); }

    .markdownBody img{
      max-width:100%;
      height:auto;
      border-radius:8px;
      border:1px solid var(--border);
    }

    .markdownBody hr{
      height:1px;
      margin:28px 0;
      border:0;
      background:var(--border);
    }

    .markdownBody .notice,
    .markdownBody .info,
    .markdownBody .warning,
    .markdownBody .danger{
      margin:18px 0;
      padding:14px 16px;
      border:1px solid;
      border-radius:7px;
    }

    .markdownBody .notice,
    .markdownBody .info{
      border-color:#54aeff;
      background:color-mix(in srgb, var(--link) 14%, var(--panel));
    }

    .markdownBody .warning{
      border-color:#d4a72c;
      background:var(--orange-soft);
    }

    .markdownBody .danger{
      border-color:#ff8182;
      background:var(--red-soft);
    }

    .emptyState{
      padding:60px 20px;
      text-align:center;
      color:var(--muted);
    }

    .emptyState strong{
      display:block;
      margin-bottom:8px;
      color:var(--text);
      font-size:20px;
    }

    .toc{
      color:var(--text);
      position:sticky;
      top:64px;
      height:calc(100vh - 64px);
      overflow:auto;
      padding:30px 20px;
      border-left:1px solid var(--border);
      background:var(--panel);
    }

    .tocTitle{
      margin:0 0 12px;
      color:var(--text);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .tocList{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .tocLink{
      padding:5px 8px;
      border-left:2px solid transparent;
      color:var(--muted);
      text-decoration:none;
      font-size:12px;
      line-height:1.45;
    }

    .tocLink:hover{
      color:var(--link);
      border-left-color:var(--link);
    }

    .tocLink.level3{ padding-left:20px; }

    .loading{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
    }

    .spinner{
      width:18px;
      height:18px;
      border:2px solid var(--border);
      border-top-color:var(--link);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{ to{ transform:rotate(360deg); } }

    .searchResults{
      position:absolute;
      left:0;
      right:0;
      top:44px;
      display:none;
      max-height:420px;
      overflow:auto;
      padding:7px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .searchResults.open{ display:block; }

    .searchResult{
      display:block;
      width:100%;
      padding:10px 11px;
      border:0;
      border-radius:6px;
      color:var(--text);
      background:transparent;
      text-align:left;
      cursor:pointer;
    }

    .searchResult:hover{ background:var(--panel-soft); }

    .searchResult strong{
      display:block;
      margin-bottom:3px;
      font-size:13px;
    }

    .searchResult span{
      color:var(--muted);
      font-size:11px;
    }


    .searchInput::placeholder{
      color:var(--muted);
      opacity:.92;
    }

    mark{
      color:inherit;
      background:#fff1a8;
      border-radius:3px;
      padding:0 .08em;
    }

    html[data-theme="dark"] mark{
      color:#0d1117;
      background:#f2cc60;
    }

    html[data-theme="dark"] .docItem.active{
      color:#ffffff;
      background:#1f6feb;
    }

    html[data-theme="dark"] .markdownBody .notice,
    html[data-theme="dark"] .markdownBody .info{
      border-color:#1f6feb;
      background:#0c2d4a;
    }

    html[data-theme="dark"] .markdownBody .warning{
      border-color:#9e6a03;
      background:#332701;
    }

    html[data-theme="dark"] .markdownBody .danger{
      border-color:#da3633;
      background:#3c1518;
    }

    html[data-theme="dark"] .markdownBody img{
      background:#ffffff;
    }


    /* =========================
       葉離／WhereWindMeet 風格
    ========================= */

    body{
      background:
        radial-gradient(circle at 10% -10%, color-mix(in srgb, var(--site-teal) 16%, transparent), transparent 34%),
        radial-gradient(circle at 88% 6%, color-mix(in srgb, var(--site-ice) 15%, transparent), transparent 30%),
        var(--bg);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:-1;
      background-image:
        linear-gradient(color-mix(in srgb, var(--site-sea) 5%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in srgb, var(--site-sea) 5%, transparent) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(180deg, rgba(0,0,0,.7), transparent 78%);
    }

    .topbar{
      margin:12px 14px 0;
      min-height:66px;
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
    }

    .brand img{
      border-radius:12px;
      box-shadow:0 8px 18px color-mix(in srgb, var(--site-sea) 18%, transparent);
    }

    .brandText strong{
      color:var(--site-sea);
    }

    .searchInput{
      border-radius:999px;
      padding-left:40px;
    }

    .searchInput:focus{
      border-color:var(--site-teal);
      box-shadow:0 0 0 3px color-mix(in srgb, var(--site-teal) 20%, transparent);
    }

    .themeToggle,
    .mobileMenuBtn{
      border-radius:999px;
    }

    .themeToggle:hover{
      color:var(--site-sea);
      border-color:var(--site-teal);
      background:color-mix(in srgb, var(--site-teal) 10%, var(--panel));
    }

    .layout{
      width:min(calc(100% - 28px), var(--max));
      margin:14px auto 28px;
      min-height:calc(100vh - 96px);
      border:1px solid var(--border);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
      background:var(--panel);
    }

    .sidebar,
    .content,
    .toc{
      top:94px;
      height:calc(100vh - 108px);
    }

    .sidebarTitle{
      color:var(--site-sea);
      letter-spacing:.02em;
    }

    .docItem{
      border-radius:12px;
      transition:.16s ease;
    }

    .docItem:hover{
      transform:translateX(3px);
      background:color-mix(in srgb, var(--site-teal) 9%, var(--panel-soft));
    }

    .docItem.active{
      color:#fff;
      background:linear-gradient(135deg, var(--site-sea), var(--site-teal));
      box-shadow:0 10px 22px color-mix(in srgb, var(--site-sea) 24%, transparent);
    }

    .statusBox{
      border-style:dashed;
      border-radius:14px;
    }

    .docHeader{
      position:relative;
      padding:22px 24px;
      border:1px solid var(--border);
      border-radius:20px;
      background:
        linear-gradient(135deg,
          color-mix(in srgb, var(--site-sea) 7%, var(--panel)),
          color-mix(in srgb, var(--site-teal) 7%, var(--panel))
        );
      overflow:hidden;
    }

    .docHeader::after{
      content:"";
      position:absolute;
      right:-48px;
      bottom:-62px;
      width:150px;
      height:150px;
      border-radius:50%;
      border:24px solid color-mix(in srgb, var(--site-sea) 7%, transparent);
      pointer-events:none;
    }

    .docTitle{
      position:relative;
      z-index:1;
      color:var(--text);
    }

    .breadcrumb,
    .docFile{
      position:relative;
      z-index:1;
    }

    .markdownBody h2{
      border-bottom-color:color-mix(in srgb, var(--site-teal) 30%, var(--border));
    }

    .markdownBody h2::before{
      content:"";
      display:inline-block;
      width:6px;
      height:20px;
      margin-right:10px;
      border-radius:999px;
      vertical-align:-2px;
      background:linear-gradient(180deg, var(--site-sea), var(--site-teal));
    }

    .markdownBody blockquote{
      border-left-color:var(--site-teal);
      border-radius:0 12px 12px 0;
    }

    .tocLink{
      border-radius:8px;
      transition:.15s ease;
    }

    .tocLink:hover{
      color:var(--site-sea);
      border-left-color:var(--site-teal);
      background:color-mix(in srgb, var(--site-teal) 7%, transparent);
    }


    .tocLink.active{
      color:var(--site-sea);
      font-weight:900;
      border-left-color:var(--site-teal);
      background:color-mix(in srgb, var(--site-teal) 12%, transparent);
    }

    .tocLink.active::before{
      content:"●";
      display:inline-block;
      margin-right:7px;
      color:var(--site-teal);
      font-size:8px;
      vertical-align:2px;
    }

    .searchResults{
      border-radius:16px;
    }

    .searchResult{
      border-radius:10px;
    }

    @media (max-width:760px){
      .topbar{
        margin:8px 8px 0;
        border-radius:18px;
      }

      .layout{
        width:calc(100% - 16px);
        margin:10px auto 18px;
        border-radius:20px;
      }

      .sidebar{
        top:0;
        height:100vh;
        border-radius:0 20px 20px 0;
      }

      .content{
        height:auto;
      }

      .docHeader{
        padding:18px;
        border-radius:18px;
      }
    }


    /* =========================================
       WhereWindMeet / PVERegistration Theme
       ========================================= */

    body{
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
        linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 88%, #18233f));
      background-attachment:fixed;
    }

    body::before{
      display:none;
    }

    .topbar{
      position:sticky;
      top:12px;
      width:min(calc(100% - 40px), 1100px);
      min-height:64px;
      margin:12px auto 0;
      padding:10px 14px;
      border:1px solid var(--border);

    .markdownBody h4{

    .markdownBody ol{

        );

    }

    .markdownBody code{

      padding:3px 8px;
      border:1px solid var(--border);

      font-weight:900;

      font-weight:500;

    .markdownBody img{

    .markdownBody .notice::before,

    .markdownBody .danger::before{
      content:"!";
      background:#ef476f;
    }

    .markdownBody .notice > :last-child,
    .markdownBody .info > :last-child,
    .markdownBody .warning > :last-child,
    .markdownBody .danger > :last-child{
      margin-bottom:0;

    .markdownBody .mdCheck{
      display:inline-flex;

      min-height:24px;

      position:relative;

    .markdownBody .mdCheck input:checked + .mdCheckBox{

      gfm: true,
      breaks: false,
      headerIds: false,
      mangle: false
    });

    function apiFolderUrl(){
      const path = DOCS_CONFIG.folder
        .split("/")
        .map(encodeURIComponent)
        .join("/");

      return `https://api.github.com/repos/${encodeURIComponent(DOCS_CONFIG.owner)}/${encodeURIComponent(DOCS_CONFIG.repo)}/contents/${path}?ref=${encodeURIComponent(DOCS_CONFIG.branch)}`;
    }

    function cleanFilename(filename){
      return filename
        .replace(/\.md$/i, "")
        .replace(/^\d+[-_. ]*/, "")
        .replace(/[-_]+/g, " ")
        .trim();
    }

    function titleFromMarkdown(markdown, fallback){
      const match = markdown.match(/^#\s+(.+)$/m);
      return match ? match[1].trim() : cleanFilename(fallback);
    }

    function fileOrder(name){
      const match = name.match(/^(\d+)/);
      return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
    }

    function slugify(text, index){
      const base = text
        .toLowerCase()
        .trim()
        .replace(/[^\p{L}\p{N}\s-]/gu, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");

      return base || `section-${index}`;
    }

    async function loadFolder(){
      try{
        el.statusBox.textContent = "正在從 GitHub 讀取文件資料夾…";

        const response = await fetch(apiFolderUrl(), {
          headers: { "Accept": "application/vnd.github+json" },
          cache: "no-store"
        });

        if(!response.ok){
          throw new Error(`GitHub API ${response.status}`);
        }

        const items = await response.json();

        state.files = items
          .filter(item => item.type === "file" && /\.md$/i.test(item.name))
          .sort((a,b) => {
            const orderDiff = fileOrder(a.name) - fileOrder(b.name);
            return orderDiff || a.name.localeCompare(b.name, "zh-Hant");
          });

        if(!state.files.length){
          throw new Error("資料夾內沒有找到 Markdown 文件");
        }

        renderFileList();

        el.statusBox.textContent = `已找到 ${state.files.length} 篇文章。`;

        const hashFile = decodeURIComponent(location.hash.replace(/^#doc=/, ""));
        const firstFile =
          state.files.find(file => file.name === hashFile) ||
          state.files.find(file => file.name === DOCS_CONFIG.defaultFile) ||
          state.files[0];

        await openDocument(firstFile.name, false);
      }catch(error){
        console.error(error);

        el.docList.innerHTML = `
          <div class="statusBox">
            無法載入文件列表。請檢查 owner、repo、branch 和 folder 設定。
          </div>
        `;

        el.markdownBody.innerHTML = `
          <div class="emptyState">
            <strong>文件載入失敗</strong>
            ${escapeHtml(error.message)}
          </div>
        `;

        el.statusBox.textContent = `錯誤：${error.message}`;
      }
    }

    function renderFileList(){
      el.docList.innerHTML = "";

      state.files.forEach(file => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "docItem";
        button.dataset.file = file.name;

        button.innerHTML = `
          <span class="docIcon">▤</span>
          <span class="docName">${escapeHtml(cleanFilename(file.name))}</span>
        `;

        button.addEventListener("click", () => openDocument(file.name));
        el.docList.appendChild(button);
      });
    }

    async function fetchMarkdown(file){
      if(state.documents.has(file.name)){
        return state.documents.get(file.name);
      }

      const response = await fetch(file.download_url, { cache:"no-store" });

      if(!response.ok){
        throw new Error(`無法讀取 ${file.name}`);
      }

      const markdown = await response.text();
      state.documents.set(file.name, markdown);
      return markdown;
    }

    async function openDocument(filename, updateHash = true){
      const file = state.files.find(item => item.name === filename);
      if(!file) return;

      state.activeFile = filename;

      document.querySelectorAll(".docItem").forEach(item => {
        item.classList.toggle("active", item.dataset.file === filename);
      });

      el.markdownBody.innerHTML = `
        <div class="loading">
          <span class="spinner"></span>
          正在讀取 ${escapeHtml(filename)}…
        </div>
      `;

      try{
        const markdown = await fetchMarkdown(file);
const title = titleFromMarkdown(markdown, file.name);

const markdownWithoutFirstTitle = markdown.replace(
  /^#\s+.+(?:\r?\n)+/,
  ""
);

const rawHtml = marked.parse(markdownWithoutFirstTitle);

const safeHtml = DOMPurify.sanitize(rawHtml, {
  ADD_ATTR: ["target"]
});

el.markdownBody.innerHTML = safeHtml;
enhanceMarkdownCheckboxes();
el.docTitle.textContent = title;
el.docFile.textContent = `${DOCS_CONFIG.folder}/${file.name}`;
el.breadcrumbName.textContent = title;
document.title = `${title}｜WhereWindMeet Docs`;

        prepareHeadings();
        buildToc();
        updateActiveToc();

        if(updateHash){
          history.replaceState(null, "", `#doc=${encodeURIComponent(file.name)}`);
        }

        closeSidebar();
        el.content.scrollTo({ top:0, behavior:"smooth" });
      }catch(error){
        el.markdownBody.innerHTML = `
          <div class="emptyState">
            <strong>文章載入失敗</strong>
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    function enhanceMarkdownCheckboxes(){
      const cells = el.markdownBody.querySelectorAll("td, th");

      cells.forEach(cell => {
        const html = cell.innerHTML;
        const match = html.match(/^\s*\[(x|X| )\]\s*/);

        if(!match) return;

        const checked = match[1].toLowerCase() === "x";

        cell.innerHTML = html.replace(
          /^\s*\[(x|X| )\]\s*/,
          `<label class="mdCheck">
             <input type="checkbox" ${checked ? "checked" : ""} disabled>
             <span class="mdCheckBox" aria-hidden="true"></span>
           </label>`
        );
      });
    }


    function prepareHeadings(){
      const headings = Array.from(
        el.markdownBody.querySelectorAll("h1, h2, h3")
      );

      const used = new Set();

      headings.forEach((heading, index) => {
        let id = slugify(heading.textContent, index);

        while(used.has(id)){
          id = `${id}-${index}`;
        }

        used.add(id);
        heading.id = id;
      });

      el.markdownBody.querySelectorAll("a[href]").forEach(link => {
        const href = link.getAttribute("href");

        if(href && /^https?:\/\//i.test(href)){
          link.target = "_blank";
          link.rel = "noopener noreferrer";
        }
      });
    }

    function buildToc(){
      const headings = Array.from(
        el.markdownBody.querySelectorAll("h2, h3")
      );

      if(!headings.length){
        el.tocList.innerHTML = `
          <span style="color:var(--muted);font-size:12px;">
            此文章沒有小標題
          </span>
        `;
        return;
      }

      el.tocList.innerHTML = headings.map(heading => `
        <a class="tocLink ${heading.tagName === "H3" ? "level3" : ""}"
           href="#${heading.id}">
          ${escapeHtml(heading.textContent)}
        </a>
      `).join("");
    }


    function updateActiveToc(){
      const headings = Array.from(
        el.markdownBody.querySelectorAll("h2, h3")
      );

      const links = Array.from(
        el.tocList.querySelectorAll(".tocLink")
      );

      if(!headings.length || !links.length) return;

      let currentId = headings[0].id;

      const contentTop = el.content.getBoundingClientRect().top;

      for(const heading of headings){
        const top = heading.getBoundingClientRect().top - contentTop;

        if(top <= 120){
          currentId = heading.id;
        }else{
          break;
        }
      }

      links.forEach(link => {
        const isActive =
          link.getAttribute("href") === `#${currentId}`;

        link.classList.toggle("active", isActive);

        if(isActive){
          link.scrollIntoView({
            block:"nearest",
            behavior:"smooth"
          });
        }
      });
    }

    async function searchDocuments(keyword){
      const query = keyword.trim().toLowerCase();

      if(!query){
        el.searchResults.classList.remove("open");
        el.searchResults.innerHTML = "";
        return;
      }

      const results = [];

      for(const file of state.files){
        try{
          const markdown = await fetchMarkdown(file);
          const title = titleFromMarkdown(markdown, file.name);
          const plain = markdown
            .replace(/```[\s\S]*?```/g, " ")
            .replace(/[#>*_`\[\]()!-]/g, " ")
            .replace(/\s+/g, " ");

          const haystack = `${title} ${plain}`.toLowerCase();

          if(haystack.includes(query)){
            const position = haystack.indexOf(query);
            const start = Math.max(0, position - 45);
            const snippet = plain.slice(start, start + 120);

            results.push({
              file: file.name,
              title,
              snippet
            });
          }
        }catch(error){
          console.warn("Search skipped:", file.name, error);
        }
      }

      renderSearchResults(results, query);
    }

    function renderSearchResults(results, query){
      if(!results.length){
        el.searchResults.innerHTML = `
          <div style="padding:14px;color:var(--muted);font-size:12px;">
            找不到「${escapeHtml(query)}」
          </div>
        `;
      }else{
        el.searchResults.innerHTML = results.map(result => `
          <button class="searchResult" type="button"
                  data-file="${escapeHtml(result.file)}">
            <strong>${highlight(result.title, query)}</strong>
            <span>${highlight(result.snippet, query)}</span>
          </button>
        `).join("");
      }

      el.searchResults.classList.add("open");

      el.searchResults.querySelectorAll(".searchResult").forEach(button => {
        button.addEventListener("click", async () => {
          await openDocument(button.dataset.file);
          el.searchResults.classList.remove("open");
          el.searchInput.value = "";
        });
      });
    }

    function highlight(text, query){
      const safeText = escapeHtml(text);
      const safeQuery = escapeRegExp(escapeHtml(query));

      return safeText.replace(
        new RegExp(`(${safeQuery})`, "ig"),
        "<mark>$1</mark>"
      );
    }

    function escapeHtml(value){
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeRegExp(value){
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    let searchTimer;

    el.searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(
        () => searchDocuments(el.searchInput.value),
        260
      );
    });

    el.searchInput.addEventListener("keydown", event => {
      if(event.key === "Escape"){
        el.searchInput.value = "";
        el.searchResults.classList.remove("open");
      }
    });

    document.addEventListener("keydown", event => {
      if(event.key === "/" && document.activeElement !== el.searchInput){
        event.preventDefault();
        el.searchInput.focus();
      }
    });

    document.addEventListener("click", event => {
      if(!event.target.closest(".searchWrap")){
        el.searchResults.classList.remove("open");
      }
    });

    function openSidebar(){
      el.sidebar.classList.add("open");
      el.sidebarBackdrop.classList.add("open");
    }

    function closeSidebar(){
      el.sidebar.classList.remove("open");
      el.sidebarBackdrop.classList.remove("open");
    }

    el.mobileMenuBtn.addEventListener("click", openSidebar);
    el.sidebarBackdrop.addEventListener("click", closeSidebar);


    el.content.addEventListener(
      "scroll",
      updateActiveToc,
      { passive:true }
    );

    window.addEventListener(
      "resize",
      updateActiveToc,
      { passive:true }
    );


    function applyTheme(theme){
      const finalTheme = theme === "dark" ? "dark" : "light";

      document.documentElement.dataset.theme = finalTheme;
      localStorage.setItem("wwm-docs-theme", finalTheme);

      const isDark = finalTheme === "dark";

      el.themeIcon.textContent = isDark ? "☀️" : "🌙";
      el.themeText.textContent = isDark ? "白天" : "夜晚";

      el.themeToggle.setAttribute(
        "aria-label",
        isDark ? "切換到白天模式" : "切換到夜晚模式"
      );
    }

    function initTheme(){
      const savedTheme = localStorage.getItem("wwm-docs-theme");
      const systemPrefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      applyTheme(savedTheme || (systemPrefersDark ? "dark" : "light"));

      el.themeToggle.addEventListener("click", () => {
        const currentTheme =
          document.documentElement.dataset.theme || "light";

        applyTheme(currentTheme === "dark" ? "light" : "dark");
      });
    }

    initTheme();

    loadFolder();
  </script>
</body>
</html>
