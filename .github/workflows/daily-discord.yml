name: Daily Recruitment Summary

on:
  schedule:
    # 每天中午 12:00（馬來西亞時間）
    # Malaysia UTC+8，所以 GitHub Actions 使用 04:00 UTC
    - cron: "0 4 * * *"

    # 每個星期六晚上 7:00（馬來西亞時間）
    # Malaysia UTC+8，所以 GitHub Actions 使用 11:00 UTC
    - cron: "0 11 * * 6"

  workflow_dispatch:
    inputs:
      mode:
        description: "選擇公告類型"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Determine announcement mode
        id: determine-mode
        shell: bash
        env:
          MANUAL_MODE: ${{ inputs.mode }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_MODE="${MANUAL_MODE:-daily}"
          elif [ "$SCHEDULE_CRON" = "0 11 * * 6" ]; then
            RUN_MODE="weekly"
          else
            RUN_MODE="daily"
          fi

          echo "Selected mode: $RUN_MODE"
          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"

      - name: Send Discord announcement
        run: node .github/scripts/post-discord.js
        env:
          RUN_MODE: ${{ steps.determine-mode.outputs.run_mode }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
