<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>夢回花深處｜江湖回憶錄</title>

  <!-- 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===== 顏色系統 ===== */
    :root{
      --bg:#0b1020;
      --bg2:#131c35;
      --panel:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#eef2ff;
      --muted:#a8b3cf;
      --accent:#6ea8ff;
      --accent2:#8b5cf6;
      --gold:#ffd76a;
    }

    /* ===== 字體系統 ===== */
    :root{
      --font-main:"Noto Sans TC", system-ui, -apple-system, "Segoe UI", sans-serif;
      --fs-h1:42px;
      --fs-h2:26px;
      --fs-body:14px;
      --fs-small:12px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:var(--font-main);
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    /* ===== 背景光暈 ===== */
    .bg-orb{
      position:fixed;
      border-radius:50%;
      filter:blur(70px);
      opacity:.3;
      pointer-events:none;
      z-index:0;
    }
    .orb1{ width:300px;height:300px;background:rgba(110,168,255,.2);top:10%;left:-5%; }
    .orb2{ width:400px;height:400px;background:rgba(139,92,246,.15);bottom:10%;right:-5%; }

    /* ===== Container（統一版）===== */
    .container{
      position:relative;
      z-index:1;
      max-width:1200px;
      margin:40px auto;
      padding:32px 24px 60px;
      border-radius:32px;

      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);

      box-shadow:
        0 25px 70px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.05);

      overflow:hidden;
      transition:.3s;
    }

    .container:hover{
      transform: translateY(-4px);
    }

    /* 發光邊框 */
    .container::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:32px;
      padding:1px;
      background: linear-gradient(120deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    /* 光暈 */
    .container::after{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      top:-80px;
      right:-80px;
      background: radial-gradient(circle, rgba(110,168,255,0.25), transparent 70%);
    }

    /* ===== Topbar ===== */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      position:relative;
      z-index:1;
    }

    .brand-badge{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      font-size:13px;
      font-weight:700;
    }

    .nav a{
      text-decoration:none;
      color:var(--text);
      padding:10px 18px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      font-weight:700;
      transition:.2s;
    }

    .nav a:hover{
      background:rgba(255,255,255,.15);
    }

    /* ===== Header ===== */
    .page-header{
      text-align:center;
      margin-bottom:40px;
      position:relative;
      z-index:1;
    }

    .page-header h1{
      font-size:var(--fs-h1);
      font-weight:800;
      background:linear-gradient(90deg,#fff,var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .page-header p{
      font-size:var(--fs-body);
      color:var(--muted);
    }

    /* ===== Filter ===== */
    .gallery-filter{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .filter-btn{
      padding:8px 20px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      cursor:pointer;
      transition:.3s;
    }

    .filter-btn:hover,
    .filter-btn.active{
      background:var(--accent);
      color:#fff;
    }

    /* ===== Gallery ===== */
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      grid-auto-rows:200px;
      gap:20px;
      position:relative;
      z-index:1;
    }

    .gallery-item{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      border:1px solid var(--line);
      background:var(--panel);
      cursor:pointer;
      transition:.4s;
    }

    .gallery-item.v-2{ grid-row:span 2; }
    .gallery-item.v-1{ grid-row:span 1.5; }

    .gallery-item:hover{
      transform:translateY(-8px);
      border-color:var(--accent);
      box-shadow:0 15px 35px rgba(0,0,0,0.4);
    }

    .gallery-img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:.5s;
    }

    .gallery-item:hover .gallery-img{
      transform:scale(1.05);
      filter:brightness(0.7);
    }

    .gallery-info{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      padding:20px;
      background:linear-gradient(to top, rgba(11,16,32,0.9), transparent);
      opacity:0;
      transition:.3s;
    }

    .gallery-item:hover .gallery-info{
      opacity:1;
    }

    .gallery-info .date{
      font-size:var(--fs-small);
      color:var(--gold);
      font-weight:700;
    }

    .gallery-info .title{
      font-size:16px;
      font-weight:700;
    }

    /* ===== Footer Link ===== */
    .back-home{
      display:block;
      margin:40px auto 0;
      text-align:center;
      color:var(--muted);
      text-decoration:none;
      font-size:14px;
    }

    .back-home:hover{
      color:var(--accent);
    }

    @media(max-width:768px){
      .gallery-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="container">

  <div class="topbar">
    <div>
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge">回憶相簿</span>
    </div>
    <div class="nav">
      <a href="index.html">返回首頁</a>
    </div>
  </div>

  <header class="page-header">
    <h1>江湖回憶錄</h1>
    <p>「江湖不一定要人很多，能一直並肩同行的人，才最難得。」</p>
  </header>

  <div class="gallery-filter">
    <div class="filter-btn active">全部</div>
    <div class="filter-btn">百業派對</div>
    <div class="filter-btn">行俠任務</div>
    <div class="filter-btn">風景合影</div>
  </div>

  <div class="gallery-grid">

    <div class="gallery-item v-2">
      <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.24</span>
        <span class="title">江南聚首</span>
      </div>
    </div>

    <div class="gallery-item v-1">
      <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.20</span>
        <span class="title">百業決戰夜</span>
      </div>
    </div>

    <div class="gallery-item v-1">
      <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.18</span>
        <span class="title">崑崙山巔</span>
      </div>
    </div>

  </div>

  <a href="index.html" class="back-home">← 返回百業首頁</a>

</div>

<script>
const btns = document.querySelectorAll('.filter-btn');
btns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    btns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>

</body>
</html>
