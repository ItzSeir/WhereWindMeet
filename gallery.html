<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夢回花深處｜江湖回憶錄</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #070b18;
      --bg2: #111a32;
      --text: #eef2ff;
      --muted: #a8b3cf;
      --accent: #6ea8ff;
      --accent2: #8b5cf6;
      --gold: #ffd76a;
      --shadow: 0 22px 60px rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      padding-top: 100px;
      overflow-x: hidden;
      font-family: "Noto Sans TC", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(110, 168, 255, .22), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(139, 92, 246, .23), transparent 28%),
        radial-gradient(circle at 45% 76%, rgba(255, 215, 106, .07), transparent 33%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.55), transparent 78%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent, rgba(7,11,24,.5));
    }

    .topbar {
      position: fixed;
      top: 20px;
      left: 50%;
      z-index: 1000;
      width: calc(100% - 40px);
      max-width: 1100px;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: rgba(15, 22, 42, .62);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: .28s ease;
    }

    .topbar.scrolled {
      top: 10px;
      background: rgba(10, 15, 30, .88);
    }

    .topbar-content {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-group,
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-badge {
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .brand-badge.sub { color: var(--muted); }

    .nav a {
      padding: 8px 18px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: .22s ease;
    }

    .nav a:hover {
      color: #fff;
      background: rgba(255,255,255,.08);
    }

    .nav a.home-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 4px 15px rgba(110,168,255,.38);
    }

    .nav a.active:not(.home-btn) {
      color: #fff;
      background: rgba(255,255,255,.13);
    }

    .container {
      max-width: 1280px;
      margin: auto;
      padding: 34px 20px 80px;
    }

    .page-header {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 18px;
      margin-bottom: 18px;
      padding: 26px;
      overflow: hidden;
      border-radius: 30px;
      background:
        radial-gradient(circle at 10% 20%, rgba(110,168,255,.24), transparent 34%),
        radial-gradient(circle at 92% 18%, rgba(139,92,246,.22), transparent 35%),
        linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.13);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .page-header::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .8;
      background: linear-gradient(120deg, rgba(255,255,255,.14), transparent 34%);
    }

    .header-left,
    .header-stats {
      position: relative;
      z-index: 1;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 7px 13px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, rgba(110,168,255,.24), rgba(139,92,246,.22));
      border: 1px solid rgba(255,255,255,.14);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.2px;
    }

    .kicker::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(255,215,106,.75);
    }

    .page-title {
      margin: 0;
      color: #fff;
      font-size: clamp(30px, 4.6vw, 50px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-shadow: 0 10px 26px rgba(0,0,0,.35);
    }

    .page-subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .8px;
    }

    .header-stats {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat-card {
      min-width: 96px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.075);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .stat-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .stat-value {
      margin-top: 4px;
      color: #fff;
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
    }

    .gallery-toolbar {
      position: sticky;
      top: 92px;
      z-index: 450;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      align-items: center;
      gap: 10px;
      margin: 0 0 28px;
      padding: 10px;
      border-radius: 24px;
      background: rgba(12,18,36,.72);
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 16px 42px rgba(0,0,0,.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .search-wrap {
      position: relative;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 76px 0 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(110,168,255,.12), rgba(139,92,246,.08));
      border: 1px solid rgba(255,255,255,.1);
    }

    .search-icon {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      font-size: 14px;
    }

    #searchInput {
      width: 100%;
      min-width: 0;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }

    #searchInput::placeholder {
      color: #93a0bf;
      font-weight: 800;
    }

    .clear-search {
      position: absolute;
      top: 50%;
      right: 10px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 13px;
      transform: translateY(-50%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      color: #e6edff;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .clear-search:hover {
      background: rgba(255,255,255,.14);
      color: #fff;
    }

    .filter {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-select-wrap {
      height: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      white-space: nowrap;
    }

    .filter-select-label {
      font-size: 12px;
      font-weight: 900;
      color: #cfd8f4;
    }

    .filter-select {
      min-width: 130px;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
    }

    .filter-select option {
      color: #111827;
      font-weight: 800;
    }

    .upload-btn {
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 999px;
      cursor: pointer;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      transition: .22s ease;
    }

    .upload-btn:hover {
      color: #fff;
      transform: translateY(-1px);
      background: rgba(255,255,255,.1);
    }

    .upload-btn {
      color: #fff;
      border-color: rgba(255,255,255,.14);
      background: linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
    }

    .gallery-result {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .result-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: #dbe7ff;
    }

    .result-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px rgba(110,168,255,.5);
    }

    .grid {
      position: relative;
      width: 100%;
      margin-top: 8px;
      transition: height .55s ease;
    }

    .item {
      position: absolute;
      width: calc(33.333% - 14px);
      overflow: hidden;
      border-radius: 24px;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.045));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 20px 46px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
      transition:
        transform .55s cubic-bezier(.4, 0, .2, 1),
        opacity .35s ease,
        filter .35s ease,
        box-shadow .3s ease;
    }

    .item::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: .34;
      background:
        linear-gradient(120deg, rgba(255,255,255,.18), transparent 30%),
        linear-gradient(to top, rgba(5,8,18,.78), transparent 56%);
      transition: .3s ease;
    }

    .item::after {
      content: "查看";
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 4;
      padding: 7px 10px;
      border-radius: 999px;
      opacity: 0;
      transform: translateY(-5px);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      background: rgba(15,23,42,.64);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(12px);
      transition: .25s ease;
    }

    .item:hover {
      box-shadow: 0 28px 70px rgba(0,0,0,.42), 0 0 0 1px rgba(110,168,255,.22);
    }

    .item:hover::before { opacity: .52; }
    .item:hover::after { opacity: 1; transform: translateY(0); }

    .item.hide {
      display: none !important;
      opacity: 0;
      pointer-events: none;
    }

    .gallery-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,.06);
      transition: transform .85s cubic-bezier(.2,.8,.2,1), filter .45s ease;
    }

    .item.shape-wide .gallery-img { aspect-ratio: 16 / 10; }
    .item.shape-square .gallery-img { aspect-ratio: 1 / 1; }
    .item.shape-tall .gallery-img { aspect-ratio: 4 / 5; }
    .item.shape-long .gallery-img { aspect-ratio: 3 / 4; }

    .item:hover .gallery-img {
      transform: scale(1.06);
      filter: saturate(1.1) contrast(1.04);
    }

    .gallery-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 52px 18px 18px;
      background: linear-gradient(to top, rgba(6,9,20,.96) 0%, rgba(6,9,20,.64) 48%, transparent 100%);
    }

    .gallery-info .date {
      display: inline-flex;
      margin-bottom: 7px;
      color: var(--gold);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .9px;
    }

    .gallery-info .title {
      display: block;
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
      letter-spacing: .4px;
    }

    .gallery-desc-preview {
      margin-top: 6px;
      color: #c6d1ea;
      font-size: 12px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .category-pill {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 4;
      padding: 7px 10px;
      border-radius: 999px;
      color: #dbeafe;
      font-size: 12px;
      font-weight: 900;
      background: rgba(96,165,250,.16);
      border: 1px solid rgba(96,165,250,.28);
      backdrop-filter: blur(12px);
    }

    .empty-state {
      display: none;
      margin: 28px 0;
      padding: 34px;
      border-radius: 24px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.055);
      border: 1px dashed rgba(255,255,255,.16);
      font-weight: 800;
    }

    .empty-state.show { display: block; }

    .upload-modal {
      position: fixed;
      inset: 0;
      z-index: 10050;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4,7,16,.76);
      backdrop-filter: blur(16px);
    }

    .upload-modal.show { display: flex; }

    .upload-card {
      width: min(540px, 100%);
      padding: 22px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 25px 80px rgba(0,0,0,.45);
    }

    .upload-card h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .upload-grid {
      display: grid;
      gap: 12px;
    }

    .upload-grid label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .upload-grid input,
    .upload-grid select,
    .upload-grid textarea {
      width: 100%;
      margin-top: 6px;
      padding: 12px 13px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.13);
      outline: none;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-family: inherit;
      font-weight: 800;
    }

    .upload-grid select option { color: #111; }
    .upload-grid textarea { min-height: 90px; resize: vertical; }

    .custom-category-wrap {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 8px;
    }

    .custom-category-wrap.show { display: grid; }

    .use-list-btn {
      margin-top: 6px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      color: #dbe7ff;
      font-weight: 900;
      cursor: pointer;
    }

    .upload-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .upload-actions button {
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .upload-cancel {
      color: #dbe7ff;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
    }

    .upload-submit {
      color: #fff;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .upload-status {
      margin-top: 12px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(4,7,16,.94);
      backdrop-filter: blur(18px);
    }

    .lightbox.show {
      display: flex;
      animation: fadeIn .25s ease;
    }

    .lightbox-inner {
      width: 94%;
      max-width: 1180px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 18px;
      align-items: stretch;
    }

    .lightbox-image-panel {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 25px 80px rgba(0,0,0,.46);
    }

    .lightbox img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
    }

    .lb-meta {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.055));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
    }

    .lb-top { display: grid; gap: 8px; }

    .lb-category {
      width: max-content;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(110,168,255,.15);
      border: 1px solid rgba(110,168,255,.28);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 900;
    }

    .lb-date {
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .lb-title {
      margin: 0;
      font-size: 25px;
      line-height: 1.35;
      font-weight: 900;
    }

    .lb-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .lb-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #c8d3ee;
      font-size: 12px;
      font-weight: 900;
    }

    .lb-counter {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
    }

    .close-btn,
    .arrow {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: #fff;
      cursor: pointer;
    }

    .close-btn {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 10001;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-size: 22px;
    }

    .arrow {
      position: fixed;
      top: 50%;
      z-index: 10000;
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.62);
      font-size: 46px;
      line-height: 1;
      user-select: none;
      transition: .22s ease;
    }

    .arrow:hover {
      color: #fff;
      background: linear-gradient(135deg, rgba(110,168,255,.28), rgba(139,92,246,.24));
      box-shadow: 0 12px 34px rgba(0,0,0,.28);
    }

    .left { left: 22px; }
    .right { right: 22px; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-header,
    .gallery-toolbar,
    .gallery-result,
    .grid {
      animation: riseIn .65s ease both;
    }

    .gallery-toolbar { animation-delay: .05s; }
    .grid { animation-delay: .12s; }

    @media (max-width: 980px) {
      .page-header { grid-template-columns: 1fr; }
      .header-stats { justify-content: flex-start; }
      .gallery-toolbar { grid-template-columns: 1fr; }
      .filter { justify-content: flex-start; }
      .lightbox-inner { grid-template-columns: 1fr; width: 100%; max-width: 920px; }
      .lb-meta { padding: 18px; }
    }

    @media (max-width: 800px) {
      .item { width: calc(50% - 10px); }
      .arrow { width: 46px; height: 46px; font-size: 42px; }
      .left { left: 10px; }
      .right { right: 10px; }
    }

    @media (max-width: 768px) {

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBIoYZqWWifh04b4to6ksLdvCeHLhNo4PE",
      authDomain: "guild-gallery.firebaseapp.com",
      projectId: "guild-gallery",
      storageBucket: "guild-gallery.firebasestorage.app",
      messagingSenderId: "1009198133204",
      appId: "1:1009198133204:web:2f1f72ff8ed5104d797041",
      measurementId: "G-HNVW852CNY"
    };

    const CLOUDINARY_CLOUD_NAME = "jwwgtso0";
    const CLOUDINARY_UPLOAD_PRESET = "qfsabzre";
    const FIRESTORE_COLLECTION = "gallery_photos";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const defaultCategories = [
      "同門合照",
      "江湖日常",
      "副本紀錄",
      "活動紀錄",
      "幫會活動",
      "風景打卡",
      "趣味截圖"
    ];

    const categoryAliases = {
      group: "同門合照",
      daily: "江湖日常"
    };

    const nav = document.getElementById("floatingNav");
    const grid = document.getElementById("grid");
    const searchInput = document.getElementById("searchInput");
    const clearSearch = document.getElementById("clearSearch");
    const resultText = document.getElementById("resultText");
    const activeFilterLabel = document.getElementById("activeFilterLabel");
    const emptyState = document.getElementById("emptyState");
    const filterSelect = document.getElementById("filterSelect");
    const sortSelect = document.getElementById("sortSelect");
    const uploadBtn = document.getElementById("openUpload");

    const uploadModal = document.getElementById("uploadModal");
    const closeUpload = document.getElementById("closeUpload");
    const submitUpload = document.getElementById("submitUpload");
    const uploadStatus = document.getElementById("uploadStatus");
    const uploadCategorySelect = document.getElementById("uploadCategorySelect");
    const customCategoryWrap = document.getElementById("customCategoryWrap");
    const uploadCategoryCustom = document.getElementById("uploadCategoryCustom");
    const useCategoryList = document.getElementById("useCategoryList");

    const lightbox = document.getElementById("lightbox");
    const lightImg = document.getElementById("light-img");
    const lbTitle = document.getElementById("lb-title");
    const lbDate = document.getElementById("lb-date");
    const lbDesc = document.getElementById("lb-desc");
    const lbCategory = document.getElementById("lb-category");
    const lbCounter = document.getElementById("lb-counter");

    let items = [];
    let currentFilter = "all";
    let currentIdx = 0;
    let categorySelectReady = false;

    window.addEventListener("scroll", () => {
      nav.classList.toggle("scrolled", window.scrollY > 50);
    }, { passive: true });

    function normalizeCategory(category) {
      return categoryAliases[category] || category || "江湖日常";
    }

    function toDateInputValue(value) {
      if (!value) return new Date().toISOString().slice(0, 10);
      if (typeof value === "string") return value.slice(0, 10);
      if (value.toDate) return value.toDate().toISOString().slice(0, 10);
      return new Date(value).toISOString().slice(0, 10);
    }

    function formatDateForDisplay(dateValue) {
      if (!dateValue) return "";
      return String(dateValue).slice(0, 10).replaceAll("-", ".");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getSortValue(item) {
      return item.dataset.sortDate || "0000-00-00";
    }

    function sortGalleryItems() {
      const sortType = sortSelect.value || "latest";

      items.sort((a, b) => {
        const aDate = getSortValue(a);
        const bDate = getSortValue(b);
        return sortType === "latest"
          ? bDate.localeCompare(aDate)
          : aDate.localeCompare(bDate);
      });

      items.forEach(item => grid.appendChild(item));
      applyFilters();
    }

    function getAllCategories() {
      const fromItems = items.map(item => item.dataset.category).filter(Boolean);
      return [...new Set([...defaultCategories, ...fromItems].map(normalizeCategory))];
    }

    function updateCategorySelect() {
      const selected = uploadCategorySelect.value;
      const categories = getAllCategories();

      uploadCategorySelect.innerHTML = "";

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        uploadCategorySelect.appendChild(option);
      });

      const newOption = document.createElement("option");
      newOption.value = "__new__";
      newOption.textContent = "＋新增標籤";
      uploadCategorySelect.appendChild(newOption);

      if (selected && categories.includes(selected)) {
        uploadCategorySelect.value = selected;
      } else if (!categorySelectReady) {
        uploadCategorySelect.value = "江湖日常";
        categorySelectReady = true;
      }
    }

    function updateCategoryFilterSelect() {
      const categories = getAllCategories();
      const previousValue = filterSelect.value || currentFilter;

      filterSelect.innerHTML = "";

      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = "全部回憶";
      filterSelect.appendChild(allOption);

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        filterSelect.appendChild(option);
      });

      const allowedValues = ["all", ...categories];
      if (allowedValues.includes(previousValue)) {
        filterSelect.value = previousValue;
        currentFilter = previousValue;
      } else {
        filterSelect.value = "all";
        currentFilter = "all";
      }
    }

    function refreshItems() {
      items = Array.from(document.querySelectorAll(".item"));

      document.getElementById("totalCount").textContent = items.length;
      document.getElementById("groupCount").textContent = items.filter(item => item.dataset.category === "同門合照").length;
      document.getElementById("dailyCount").textContent = items.filter(item => item.dataset.category === "江湖日常").length;

      updateCategoryFilterSelect();
      updateCategorySelect();
    }

    function setImageShape(item, img) {
      const ratio = img.naturalWidth / Math.max(img.naturalHeight, 1);

      item.classList.remove("shape-wide", "shape-square", "shape-tall", "shape-long");

      if (ratio >= 1.45) {
        item.classList.add("shape-wide");
      } else if (ratio >= .9) {
        item.classList.add("shape-square");
      } else if (ratio >= .68) {
        item.classList.add("shape-tall");
      } else {
        item.classList.add("shape-long");
      }
    }

    function createGalleryItem(photo) {
      const category = normalizeCategory(photo.category);
      const title = photo.title || "未命名回憶";
      const sortDate = toDateInputValue(photo.photo_date || photo.date || photo.created_at);
      const date = formatDateForDisplay(sortDate);
      const description = photo.description || "這一刻，留給江湖慢慢回味。";
      const imageUrl = photo.image_url || photo.secure_url || "";

      const item = document.createElement("div");
      item.className = "item shape-square";
      item.dataset.category = category;
      item.dataset.title = title;
      item.dataset.date = date;
      item.dataset.sortDate = sortDate;
      item.dataset.desc = description;

      item.innerHTML = `
        <img
          src="${escapeHtml(imageUrl)}"
          class="gallery-img"
          alt="${escapeHtml(title)}"
          loading="lazy"
          decoding="async"
        />
        <div class="gallery-info">
          <span class="date">${escapeHtml(date)}</span>
          <span class="title">${escapeHtml(title)}</span>
        </div>
      `;

      grid.appendChild(item);
      prepareItem(item);
      return item;
    }

    function prepareItem(item) {
      const oldPill = item.querySelector(".category-pill");
      if (oldPill) oldPill.remove();

      const pill = document.createElement("span");
      pill.className = "category-pill";
      pill.textContent = item.dataset.category;
      item.appendChild(pill);

      const info = item.querySelector(".gallery-info");
      if (info && !info.querySelector(".gallery-desc-preview")) {
        const desc = document.createElement("div");
        desc.className = "gallery-desc-preview";
        desc.textContent = item.dataset.desc || "這一刻，留給江湖慢慢回味。";
        info.appendChild(desc);
      }

      item.addEventListener("click", () => {
        const list = visibleItems();
        currentIdx = list.indexOf(item);
        showLightbox(currentIdx);
        lightbox.classList.add("show");
        document.body.style.overflow = "hidden";
      });

      const img = item.querySelector("img");
      if (!img) return;

      if (img.complete && img.naturalWidth) {
        setImageShape(item, img);
        layout();
      } else {
        img.addEventListener("load", () => {
          setImageShape(item, img);
          layout();
        });
        img.addEventListener("error", () => {
          item.style.opacity = ".55";
          layout();
        });
      }
    }

    async function loadGallery() {
      uploadStatus.textContent = "";

      try {
        const q = query(collection(db, FIRESTORE_COLLECTION), orderBy("photo_date", "desc"));
        const snapshot = await getDocs(q);

        grid.innerHTML = "";

        snapshot.forEach(docSnap => {
          createGalleryItem({ id: docSnap.id, ...docSnap.data() });
        });

        refreshItems();
        sortGalleryItems();
      } catch (error) {
        console.error(error);
        grid.innerHTML = "";
        refreshItems();
        applyFilters();
        layout();
        emptyState.classList.add("show");
        resultText.textContent = "載入失敗，請檢查 Firestore Rules。";
      }
    }

    function getColumnCount() {
      if (window.innerWidth <= 560) return 1;
      if (window.innerWidth <= 800) return 2;
      return 3;
    }

    function layout() {
      const visible = items.filter(item => !item.classList.contains("hide"));
      const containerWidth = grid.offsetWidth;
      const cols = getColumnCount();
      const gutter = window.innerWidth <= 560 ? 16 : 20;
      const colWidth = (containerWidth - (gutter * (cols - 1))) / cols;
      const heights = Array(cols).fill(0);

      visible.forEach(item => {
        item.style.opacity = "1";
        item.style.width = `${colWidth}px`;

        const col = heights.indexOf(Math.min(...heights));
        const x = col * (colWidth + gutter);
        const y = heights[col];

        item.style.transform = `translate(${x}px, ${y}px)`;
        heights[col] += item.offsetHeight + gutter;
      });

      grid.style.height = visible.length ? `${Math.max(...heights)}px` : "0px";
    }

    function applyFilters() {
      const q = searchInput.value.trim().toLowerCase();
      let shown = 0;

      items.forEach(item => {
        const catOK = currentFilter === "all" || item.dataset.category === currentFilter;
        const text = `${item.dataset.title || ""} ${item.dataset.date || ""} ${item.dataset.desc || ""}`.toLowerCase();
        const searchOK = !q || text.includes(q);
        const show = catOK && searchOK;

        item.classList.toggle("hide", !show);
        if (show) shown++;
      });

      const sortLabel = sortSelect.value === "oldest" ? "最早日期" : "最新日期";
      activeFilterLabel.textContent = `${currentFilter === "all" ? "全部回憶" : currentFilter}・${sortLabel}`;
      resultText.textContent = q ? `找到 ${shown} 個回憶` : `顯示 ${shown} 個回憶`;
      emptyState.classList.toggle("show", shown === 0);

      let timer = setInterval(layout, 45);
      setTimeout(() => clearInterval(timer), 620);
    }

    function visibleItems() {
      return items.filter(item => !item.classList.contains("hide"));
    }

    function showLightbox(idx) {
      const list = visibleItems();
      const target = list[idx];
      if (!target) return;

      const img = target.querySelector("img");

      lightImg.src = img.src;
      lightImg.alt = target.dataset.title || "";
      lbTitle.textContent = target.dataset.title || "";
      lbDate.textContent = target.dataset.date || "";
      lbDesc.textContent = target.dataset.desc || "這一刻，留給江湖慢慢回味。";
      lbCategory.textContent = target.dataset.category || "";
      lbCounter.textContent = `${idx + 1} / ${list.length}`;
    }

    function nextPhoto() {
      const list = visibleItems();
      if (!list.length) return;
      currentIdx = (currentIdx + 1) % list.length;
      showLightbox(currentIdx);
    }

    function prevPhoto() {
      const list = visibleItems();
      if (!list.length) return;
      currentIdx = (currentIdx - 1 + list.length) % list.length;
      showLightbox(currentIdx);
    }

    function closeLightbox() {
      lightbox.classList.remove("show");
      document.body.style.overflow = "";
    }

    function getUploadCategory() {
      if (uploadCategorySelect.value === "__new__") {
        return uploadCategoryCustom.value.trim();
      }
      return uploadCategorySelect.value;
    }

    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
        method: "POST",
        body: formData
      });

      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.error?.message || "Cloudinary upload failed.");
      }

      return result;
    }

    filterSelect.addEventListener("change", () => {
      currentFilter = filterSelect.value;
      applyFilters();
    });

    sortSelect.addEventListener("change", sortGalleryItems);

    searchInput.addEventListener("input", applyFilters);

    clearSearch.addEventListener("click", () => {
      searchInput.value = "";
      applyFilters();
      searchInput.focus();
    });

    uploadBtn.addEventListener("click", () => {
      uploadModal.classList.add("show");
      uploadStatus.textContent = "";
      updateCategorySelect();
    });

    closeUpload.addEventListener("click", () => uploadModal.classList.remove("show"));

    uploadModal.addEventListener("click", event => {
      if (event.target === uploadModal) uploadModal.classList.remove("show");
    });

    uploadCategorySelect.addEventListener("change", () => {
      const isNew = uploadCategorySelect.value === "__new__";
      customCategoryWrap.classList.toggle("show", isNew);
      if (isNew) uploadCategoryCustom.focus();
    });

    useCategoryList.addEventListener("click", () => {
      uploadCategoryCustom.value = "";
      uploadCategorySelect.value = "江湖日常";
      customCategoryWrap.classList.remove("show");
    });

    document.getElementById("uploadDate").value = new Date().toISOString().slice(0, 10);

    submitUpload.addEventListener("click", async () => {
      const file = document.getElementById("uploadFile").files[0];
      const title = document.getElementById("uploadTitle").value.trim();
      const photoDate = document.getElementById("uploadDate").value;
      const category = getUploadCategory();
      const description = document.getElementById("uploadDesc").value.trim();

      if (!file) {
        uploadStatus.textContent = "請先選擇圖片。";
        return;
      }

      if (!file.type.startsWith("image/")) {
        uploadStatus.textContent = "只能上傳圖片檔案。";
        return;
      }

      if (!title) {
        uploadStatus.textContent = "請填寫標題。";
        return;
      }

      if (!photoDate) {
        uploadStatus.textContent = "請選擇日期。";
        return;
      }

      if (!category) {
        uploadStatus.textContent = "請選擇或新增分類標籤。";
        return;
      }

      submitUpload.disabled = true;
      uploadStatus.textContent = "圖片上傳中...";

      try {
        const uploaded = await uploadToCloudinary(file);
        uploadStatus.textContent = "圖片已上傳，正在儲存資料...";

        const photoData = {
          title,
          category,
          description,
          image_url: uploaded.secure_url,
          image_path: uploaded.public_id,
          photo_date: photoDate,
          cloudinary_public_id: uploaded.public_id,
          width: uploaded.width || null,
          height: uploaded.height || null,
          created_at: serverTimestamp()
        };

        await addDoc(collection(db, FIRESTORE_COLLECTION), photoData);

        createGalleryItem(photoData);
        refreshItems();
        sortGalleryItems();

        uploadStatus.textContent = "上傳成功！";
        document.getElementById("uploadFile").value = "";
        document.getElementById("uploadTitle").value = "";
        document.getElementById("uploadDesc").value = "";
        uploadCategoryCustom.value = "";
        uploadCategorySelect.value = category;
        customCategoryWrap.classList.remove("show");

        setTimeout(() => uploadModal.classList.remove("show"), 700);
      } catch (error) {
        console.error(error);
        uploadStatus.textContent = "上傳失敗：" + error.message;
      } finally {
        submitUpload.disabled = false;
      }
    });

    document.getElementById("next").addEventListener("click", event => {
      event.stopPropagation();
      nextPhoto();
    });

    document.getElementById("prev").addEventListener("click", event => {
      event.stopPropagation();
      prevPhoto();
    });

    document.getElementById("closeLightbox").addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", event => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", event => {
      if (!lightbox.classList.contains("show")) return;
      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowRight") nextPhoto();
      if (event.key === "ArrowLeft") prevPhoto();
    });

    window.addEventListener("load", loadGallery);

    window.addEventListener("resize", () => {
      clearTimeout(window.__layoutTimer);
      window.__layoutTimer = setTimeout(layout, 120);
    });
  </script>
<script>
(async () => {

const box = document.getElementById("siteAnnouncement");
if(!box) return;

try{

const res = await fetch("/WhereWindMeet/data/announcement.json?t=" + Date.now());
const data = await res.json();

if(!data.enabled){
    box.remove();
    return;
}

const announcements = Array.isArray(data.announcements) ? data.announcements : [];

if(!announcements.length){
    box.remove();
    return;
}

let current = 0;
let timer = null;

function render(index){
    const item = announcements[index];

    box.innerHTML = `
    <div class="announcementBar">

        <div class="announcementIcon">📢</div>

        <div class="announcementContent">

            <div class="announcementTitle">
                ${escapeHtml(item.title || "重要公告")}
            </div>

            ${item.pill ? `
            <div class="announcementPill">
                ${escapeHtml(item.pill)}
            </div>
            ` : ""}

            <div class="announcementText">
                ${escapeHtml(item.text || item.content || item.message || "")}
            </div>

            <div class="announcementTime">
                更新時間：${escapeHtml(item.updated || "")}
            </div>

        </div>

        ${
          announcements.length > 1 ? `
          <div class="announcementControls">
            <button class="announcementArrow" id="annPrev" type="button">‹</button>
            <button class="announcementArrow" id="annNext" type="button">›</button>
          </div>

          <div class="announcementDots">
            ${announcements.map((_, i) => `
              <button class="announcementDot ${i === current ? "active" : ""}" data-index="${i}" type="button"></button>
            `).join("")}
          </div>
          ` : ""
        }

    </div>
    `;

    const prev = box.querySelector("#annPrev");
    const next = box.querySelector("#annNext");
    const dots = box.querySelectorAll(".announcementDot");

    if(prev) prev.onclick = () => manualGo(current - 1);
    if(next) next.onclick = () => manualGo(current + 1);

    dots.forEach(dot => {
      dot.onclick = () => manualGo(Number(dot.dataset.index));
    });
}

function go(index){
    current = (index + announcements.length) % announcements.length;
    render(current);
}

function manualGo(index){
    go(index);
    restartTimer();
}

function restartTimer(){
    if(timer) clearInterval(timer);

    if(announcements.length > 1){
        timer = setInterval(() => {
            go(current + 1);
        }, 5000);
    }
}

render(current);
restartTimer();

}catch(e){
    console.log(e);
    box.remove();
}

function escapeHtml(text){
  return String(text || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

})();
</script>
