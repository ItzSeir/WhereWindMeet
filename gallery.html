<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
    radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
}

/* ===== navbar ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.topbar-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-group { display: flex; gap: 8px; }

.brand-badge {
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 700;
}

.brand-badge.sub { color: var(--muted); }

.nav { display: flex; gap: 8px; }

.nav a {
  text-decoration: none;
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

.nav a.home-btn {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.nav a.active:not(.home-btn) {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

/* ===== container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== header ===== */
.page-header {
  text-align: center;
  margin-bottom: 50px;
}

.page-title {
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(to right, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.page-subtitle {
  color: var(--muted);
  margin-top: 10px;
  font-size: 14px;
}

/* ===== filter ===== */
.filter {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:40px;
}

.filter button {
  padding:10px 24px;
  border-radius:50px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
  color:var(--muted);
  cursor:pointer;
}

.filter .active {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
}

/* ===== grid ===== */
.grid {
  position:relative;
}

.item {
  position:absolute;
  border-radius:20px;
  overflow:hidden;
  background:var(--panel);
  cursor:pointer;
  transition:
    transform 0.55s cubic-bezier(.2,.8,.2,1),
    width 0.4s ease,
    height 0.4s ease,
    opacity 0.35s ease;
}

.item.hide {
  opacity:0;
  transform:scale(0.9);
  pointer-events:none;
}

.gallery-img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition: transform 0.6s;
}

.item:hover .gallery-img {
  transform:scale(1.08);
}

/* ===== hover info ===== */
.gallery-info{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
  opacity:0;
  transform:translateY(15px);
  transition:.3s;
  z-index:2;
}

.item:hover .gallery-info{
  opacity:1;
  transform:translateY(0);
}

.date{ font-size:12px; color:var(--gold);}
.title{ font-size:16px; font-weight:700;}

/* ===== lightbox ===== */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lightbox.show{ display:flex; }

.lightbox-inner{
  max-width:900px;
  width:90%;
}

.lightbox img{
  max-width:100%;
  max-height:70vh;
  object-fit:contain;
}

.lb-meta{ margin-top:15px; }
.lb-title{ font-size:20px; font-weight:800;}
.lb-desc{ color:var(--muted); }

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:50px;
  cursor:pointer;
  color:#aaa;
}
.left{ left:20px; }
.right{ right:20px; }
</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖回憶錄</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html" class="active">江湖回憶錄</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="page-header">
  <h1 class="page-title">夢回花深處</h1>
  <p class="page-subtitle">MEMORIES</p>
</div>

<div class="filter">
  <button class="active" data-filter="all">全部</button>
  <button data-filter="nye">跨年</button>
  <button data-filter="daily">日常</button>
</div>

<div class="grid" id="grid">

<div class="item" data-category="nye" data-title="跨年合照" data-date="2026.01.01" data-desc="迎接新的江湖篇章。">
<img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
<div class="gallery-info">
<span class="date">2026.01.01</span>
<span class="title">跨年合照</span>
</div>
</div>

<div class="item v2" data-category="daily" data-title="夢回舞獅團" data-date="2026.02.13" data-desc="慶祝江湖盛世。">
<img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
<div class="gallery-info">
<span class="date">2026.02.13</span>
<span class="title">夢回舞獅團</span>
</div>
</div>

<div class="item" data-category="daily" data-title="搖滾歌手" data-date="2026.02.16" data-desc="在花深處的音律之夜。">
<img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img">
<div class="gallery-info">
<span class="date">2026.02.16</span>
<span class="title">搖滾歌手</span>
</div>
</div>

</div>
</div>

<div class="lightbox" id="lightbox">
<div class="arrow left" id="prev">‹</div>
<div class="lightbox-inner">
<img id="light-img">
<div class="lb-meta">
<div id="lb-title" class="lb-title"></div>
<div id="lb-desc" class="lb-desc"></div>
</div>
</div>
<div class="arrow right" id="next">›</div>
</div>

<script>
const grid = document.getElementById('grid');
const items = [...document.querySelectorAll('.item')];

function layout(){
  const cols = window.innerWidth > 768 ? 3 : 2;
  const gap = 20;
  const colWidth = (grid.offsetWidth - gap*(cols-1))/cols;

  const heights = Array(cols).fill(0);

  items.forEach(item=>{
    if(item.classList.contains('hide')) return;

    const isBig = item.classList.contains('v2') && cols>=3;
    let col = heights.indexOf(Math.min(...heights));
    if(isBig && col===cols-1) col--;

    const width = isBig ? colWidth*2+gap : colWidth;

    const ratio = isBig ? 0.75 : 0.66;
    const height = width * ratio;

    const x = col*(colWidth+gap);
    const y = heights[col];

    item.style.width = width+"px";
    item.style.height = height+"px";
    item.style.transform = `translate(${x}px,${y}px)`;

    const h = height+gap;

    if(isBig){
      heights[col]+=h;
      heights[col+1]+=h;
    } else heights[col]+=h;
  });

  grid.style.height = Math.max(...heights)+"px";
}

/* filter */
document.querySelectorAll('.filter button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const f=btn.dataset.filter;
    items.forEach(i=>{
      i.classList.toggle('hide',!(f==="all"||i.dataset.category===f));
    });

    requestAnimationFrame(layout);
  };
});

/* lightbox */
const lb=document.getElementById('lightbox');
const img=document.getElementById('light-img');
const title=document.getElementById('lb-title');
const desc=document.getElementById('lb-desc');
let idx=0;

function show(i){
  const list=items.filter(x=>!x.classList.contains('hide'));
  const t=list[i];
  img.src=t.querySelector('img').src;
  title.textContent=t.dataset.title;
  desc.textContent=t.dataset.desc;
}

items.forEach((item,i)=>{
  item.onclick=()=>{
    idx=i;
    show(idx);
    lb.classList.add('show');
  };
});

document.getElementById('next').onclick=()=>{
  const list=items.filter(x=>!x.classList.contains('hide'));
  idx=(idx+1)%list.length;
  show(idx);
};
document.getElementById('prev').onclick=()=>{
  const list=items.filter(x=>!x.classList.contains('hide'));
  idx=(idx-1+list.length)%list.length;
  show(idx);
};

lb.onclick=e=>{
  if(e.target===lb) lb.classList.remove('show');
};

window.addEventListener('load',layout);
window.addEventListener('resize',layout);
</script>

</body>
</html>
