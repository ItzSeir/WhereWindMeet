<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>夢回花深處｜江湖回憶錄</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===== 顏色系統 ===== */
    :root{
      --bg:#0b1020;
      --bg2:#131c35;
      --panel:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#eef2ff;
      --muted:#a8b3cf;
      --accent:#6ea8ff;
      --accent2:#8b5cf6;
      --gold:#ffd76a;
      /* 導航欄背景，稍微調暗一點點以增加對比 */
      --nav-bg: rgba(15, 22, 42, 0.6);
    }

    :root{
      --font-main:"Noto Sans TC", system-ui, -apple-system, "Segoe UI", sans-serif;
      --fs-h1:clamp(30px, 5vw, 40px);
      --fs-body:14px;
      --fs-small:12px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      /* 為浮動導航留空間，因為它是浮動的，所以這裡用 padding-top */
      padding-top: 100px; 
      font-family:var(--font-main);
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }

    /* ===== 背景光暈 ===== */
    .bg-orb{
      position:fixed;
      border-radius:50%;
      filter:blur(70px);
      opacity:.3;
      pointer-events:none;
      z-index:0;
    }
    .orb1{ width:300px;height:300px;background:rgba(110,168,255,.2);top:10%;left:-5%; }
    .orb2{ width:400px;height:400px;background:rgba(139,92,246,.15);bottom:10%;right:-5%; }

    /* ===== 浮動導航列 (Floating Navbar) ===== */
    .topbar {
      position: fixed;
      top: 20px; /* 距離頂部一些距離 */
      left: 50%;
      transform: translateX(-50%); /* 水平置中核心 */
      width: calc(100% - 40px); /* 在小螢幕時保持左右間距 */
      max-width: 1100px; /* 限制最大寬度，比 container 窄一點點看起來更精緻 */
      height: 64px;
      z-index: 100;
      
      /* 核心：圓滑長方形框框 */
      background: var(--nav-bg);
      backdrop-filter: blur(20px) saturate(180%);
      border-radius: 999px; /* 超圓滑邊角 */
      border: 1px solid rgba(255, 255, 255, 0.12);
      
      /* 深邃陰影，讓它「浮」起來 */
      box-shadow: 
        0 10px 30px rgba(0,0,0,0.3),
        inset 0 1px 1px rgba(255,255,255,0.1);
      
      display: flex;
      align-items: center;
      padding: 0 10px; /* 內縮一些 */
      transition: all 0.3s ease;
    }

    /* 捲動時導航欄的微調 (可選，增加質感) */
    .topbar.scrolled {
      top: 10px;
      background: rgba(10, 15, 30, 0.8);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .topbar-content {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    .brand-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .brand-badge {
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }

    /* Gallery 字樣使用金屬光澤 */
    .brand-badge.gallery-tag {
      background: linear-gradient(135deg, rgba(255,215,106,0.1) 0%, rgba(255,255,255,0.05) 100%);
      color: var(--gold);
      border-color: rgba(255,215,106,0.2);
    }

    .nav a {
      text-decoration: none;
      color: var(--text);
      padding: 8px 24px;
      border-radius: 999px; /* 按鈕也改為圓滑樣式 */
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-weight: 800;
      font-size: 13px;
      transition: .3s;
      box-shadow: 0 4px 15px rgba(110,168,255,0.3);
      letter-spacing: 0.5px;
    }

    .nav a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(110,168,255,0.5);
      filter: brightness(1.1);
    }

    /* ===== 主容器 (微調頂部邊距) ===== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 40px 24px 60px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 70px rgba(0,0,0,0.4);
    }

    /* 發光邊框效果 */
    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 32px;
      padding: 1px;
      background: linear-gradient(120deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ===== 其他樣式保持不變 ===== */
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 {
      font-size: var(--fs-h1); margin: 0 0 12px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(90deg, #fff, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .page-header p { font-size: var(--fs-body); color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.6; }

    .gallery-filter { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
    .filter-btn {
      padding: 10px 24px; border-radius: 999px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--line); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: .3s;
    }
    .filter-btn:hover, .filter-btn.active { background: rgba(255,255,255,0.12); color: var(--accent); border-color: var(--accent); }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); grid-auto-rows: 220px; gap: 24px; }
    .gallery-item {
      position: relative; border-radius: 24px; overflow: hidden; border: 1px solid var(--line);
      background: var(--panel); cursor: pointer; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .gallery-item.v-2 { grid-row: span 2; }
    .gallery-item.v-1 { grid-row: span 1.5; }
    .gallery-item:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 2; }
    .gallery-img { width: 100%; height: 100%; object-fit: cover; transition: .6s; }
    .gallery-item:hover .gallery-img { transform: scale(1.1); filter: brightness(0.6); }
    .gallery-info {
      position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 24px;
      background: linear-gradient(to top, rgba(11,16,32,0.95) 0%, transparent 60%); opacity: 0; transition: .4s;
    }
    .gallery-item:hover .gallery-info { opacity: 1; }
    .gallery-info .date { font-size: var(--fs-small); color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .gallery-info .title { font-size: 18px; font-weight: 700; color: #fff; }
    .back-home { display: block; margin-top: 50px; text-align: center; color: var(--muted); text-decoration: none; font-size: 14px; transition: .3s; }
    .back-home:hover { color: var(--gold); }

    @media(max-width:768px){
      body { padding-top: 90px; }
      .topbar { width: calc(100% - 20px); top: 10px; padding: 0 5px; height: 56px; }
      .brand-badge { padding: 5px 12px; font-size: 12px; }
      .nav a { padding: 6px 18px; font-size: 12px; }
      .gallery-grid { grid-template-columns: 1fr; grid-auto-rows: 250px; }
      .gallery-item.v-2, .gallery-item.v-1 { grid-row: span 1; }
    }
  </style>
</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<nav class="topbar" id="floatingNav">
  <div class="topbar-content">
    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge gallery-tag">GALLERY</span>
    </div>
    <div class="nav">
      <a href="index.html">返回首頁</a>
    </div>
  </div>
</nav>

<div class="container">

  <header class="page-header">
    <h1>江湖回憶錄</h1>
    <p>那些並肩作戰與把酒言歡的瞬間，都值得被妥善收藏。</p>
  </header>

  <div class="gallery-filter">
    <div class="filter-btn active">全部回憶</div>
    <div class="filter-btn">百業派對</div>
    <div class="filter-btn">行俠任務</div>
    <div class="filter-btn">風景合影</div>
  </div>

  <div class="gallery-grid">
    <div class="gallery-item v-2">
      <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.24</span>
        <span class="title">江南聚首：春雨中的茶會</span>
      </div>
    </div>

    <div class="gallery-item v-1">
      <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.20</span>
        <span class="title">百業決戰：熱血之夜</span>
      </div>
    </div>

    <div class="gallery-item v-1">
      <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.18</span>
        <span class="title">崑崙之巔：俯瞰江湖</span>
      </div>
    </div>

    <div class="gallery-item v-2">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=600" class="gallery-img">
      <div class="gallery-info">
        <span class="date">2026.04.15</span>
        <span class="title">社眾日常：把酒言歡</span>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-home">← BACK TO HOME</a>

</div>

<script>
  // 篩選器按鈕交互
  const btns = document.querySelectorAll('.filter-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // 捲動時導航欄效果 (可選)
  const nav = document.getElementById('floatingNav');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  });
</script>
<script>
  document.getElementById('pageTitle').innerText = "江湖回憶錄";
  document.querySelectorAll('.nav-link')[2].classList.add('active');
</script>
</body>
</html>
