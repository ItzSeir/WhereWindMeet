<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖數據庫</title>

<meta name="view-transition" content="same-origin" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.1);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --gold:#ffd76a;
  /* 世代色調 - 調整為發亮質感 */
  --gen1: #3b82f6; --gen2: #60a5fa; --gen3: #a78bfa; --gen4: #f472b6; --gen5: #fb923c;
}

*{ box-sizing:border-box; }
body{
  margin:0; font-family:"Noto Sans TC", sans-serif; color:var(--text);
  background: var(--bg); padding-top:110px; min-height: 100vh;
}

/* ===== Navbar ===== */
.topbar {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 1100px; height: 64px; z-index: 1000;
  display: flex; align-items: center; padding: 0 12px; border-radius: 999px;
  background: rgba(15, 22, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
}
.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.nav a { text-decoration: none; color: var(--muted); padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; }
.nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
.nav a.home-btn { color: #fff; background: linear-gradient(135deg, #6ea8ff, #8b5cf6); }

/* ===== 內容區 ===== */
.container { max-width: 1300px; margin: auto; padding: 20px; }
.page-header { text-align: center; margin-bottom: 30px; }
.page-title { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* ===== Chart 容器 ===== */
.chart-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 30px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

#cy {
  width: 100%;
  height: 750px;
  background-image: 
    radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size: 40px 40px; /* 網格背景 */
}

/* 圖例 */
.legend {
  position: absolute; bottom: 30px; left: 30px;
  background: rgba(15, 22, 42, 0.9);
  padding: 20px; border-radius: 20px; border: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 10px; z-index: 10;
}
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
.dot { width: 10px; height: 10px; border-radius: 50%; }

</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-content">
    <div style="font-weight: 800; padding: 0 20px;">夢回花深處</div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">江湖脈絡</a>
    </div>
  </div>
</nav>

<div class="container">
  <header class="page-header">
    <h1 class="page-title">江湖脈絡 · 師徒傳承圖</h1>
  </header>

  <div class="chart-card">
    <div class="legend">
      <div class="legend-item"><span class="dot" style="background:var(--gen1)"></span> 第一代 (宗師)</div>
      <div class="legend-item"><span class="dot" style="background:var(--gen2)"></span> 第二代</div>
      <div class="legend-item"><span class="dot" style="background:var(--gen3)"></span> 第三代</div>
      <div class="legend-item"><span class="dot" style="background:var(--gen4)"></span> 第四代</div>
      <div class="legend-item"><span class="dot" style="background:var(--gen5)"></span> 第五代</div>
    </div>
    <div id="cy"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const cy = cytoscape({
    container: document.getElementById('cy'),
    layout: {
      name: 'cose', // 彈簧佈局
      componentSpacing: 120,
      nodeRepulsion: 8000,
      edgeElasticity: 100,
      nestingFactor: 1.2,
      padding: 50,
      animate: true,
      gravity: 0.25
    },
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(id)',
          'color': '#fff',
          'font-size': '12px',
          'text-valign': 'bottom',
          'text-margin-y': '8px',
          'background-color': 'var(--muted)',
          'width': '16px', 'height': '16px',
          'text-outline-width': 2,
          'text-outline-color': '#0b1020',
          'transition-property': 'width, height, background-color, box-shadow',
          'transition-duration': '0.3s'
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': 'rgba(255,255,255,0.1)',
          'target-arrow-color': 'rgba(255,255,255,0.2)',
          'target-arrow-shape': 'vee',
          'curve-style': 'bezier',
          'arrow-scale': 0.8
        }
      },
      // 世代樣式定義
      { selector: '.g1', style: { 'background-color': '#3b82f6', 'width': 22, 'height': 22, 'box-shadow': '0 0 15px #3b82f6' } },
      { selector: '.g2', style: { 'background-color': '#60a5fa', 'width': 18, 'height': 18 } },
      { selector: '.g3', style: { 'background-color': '#a78bfa' } },
      { selector: '.g4', style: { 'background-color': '#f472b6' } },
      { selector: '.g5', style: { 'background-color': '#fb923c' } },
      
      // 懸停互動
      { selector: 'node:hover', style: { 'width': 28, 'height': 28, 'font-size': '14px', 'z-index': 999 } },
      { selector: 'edge:hover', style: { 'line-color': '#6ea8ff', 'width': 3, 'opacity': 1 } }
    ],
    elements: [
      // 節點定義
      { data: { id: '姜澈' }, classes: 'g1' },
      { data: { id: '花臻茵' }, classes: 'g2' },
      { data: { id: '似水' }, classes: 'g3' },
      { data: { id: '酥酥不酥' }, classes: 'g4' },
      { data: { id: '青葉' }, classes: 'g4' },
      { data: { id: '郁竹' }, classes: 'g4' },
      { data: { id: '多多' }, classes: 'g5' },
      { data: { id: '少音' }, classes: 'g5' },

      { data: { id: '曲絡寧' }, classes: 'g2' },
      { data: { id: '白離' }, classes: 'g3' },
      { data: { id: '沐雨橙風' }, classes: 'g4' },
      { data: { id: '雨宮天' }, classes: 'g4' },
      { data: { id: '染冉' }, classes: 'g5' },
      { data: { id: '艾倫' }, classes: 'g5' },
      { data: { id: '東方念' }, classes: 'g5' },
      { data: { id: '筱風' }, classes: 'g5' },

      { data: { id: '芝士漢堡' }, classes: 'g1' },
      { data: { id: '顧立舟' }, classes: 'g2' },
      { data: { id: '葉染塵' }, classes: 'g2' },
      { data: { id: '一杯豆漿' }, classes: 'g2' },
      { data: { id: '羽玄' }, classes: 'g3' },

      { data: { id: '楚小閣' }, classes: 'g1' },
      { data: { id: '稚米' }, classes: 'g2' },

      { data: { id: '鯨滿' }, classes: 'g1' },
      { data: { id: '姬蕭遙' }, classes: 'g2' },

      { data: { id: '蘋' }, classes: 'g1' },
      { data: { id: '冉冉生煙' }, classes: 'g2' },

      { data: { id: '白雲凌' }, classes: 'g1' },
      { data: { id: '無名' }, classes: 'g2' },

      { data: { id: '乖乖' }, classes: 'g1' },

      // 連線關係 (嚴格按照圖片一)
      { data: { source: '姜澈', target: '花臻茵' } },
      { data: { source: '花臻茵', target: '似水' } },
      { data: { source: '花臻茵', target: '曲絡寧' } },
      { data: { source: '似水', target: '酥酥不酥' } },
      { data: { source: '似水', target: '青葉' } },
      { data: { source: '似水', target: '郁竹' } },
      { data: { source: '青葉', target: '多多' } },
      { data: { source: '青葉', target: '少音' } },

      { data: { source: '曲絡寧', target: '白離' } },
      { data: { source: '白離', target: '沐雨橙風' } },
      { data: { source: '白離', target: '雨宮天' } },
      { data: { source: '沐雨橙風', target: '染冉' } },
      { data: { source: '雨宮天', target: '艾倫' } },
      { data: { source: '雨宮天', target: '東方念' } },
      { data: { source: '雨宮天', target: '筱風' } },

      { data: { source: '芝士漢堡', target: '顧立舟' } },
      { data: { source: '芝士漢堡', target: '葉染塵' } },
      { data: { source: '芝士漢堡', target: '一杯豆漿' } },
      { data: { source: '顧立舟', target: '羽玄' } },

      { data: { source: '楚小閣', target: '稚米' } },
      { data: { source: '鯨滿', target: '姬蕭遙' } },
      { data: { source: '蘋', target: '冉冉生煙' } },
      { data: { source: '白雲凌', target: '無名' } },
      { data: { source: '乖乖', target: '羽玄' } }
    ]
  });
});
</script>

</body>
</html>
