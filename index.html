  <div class="container">
    <section class="hero">
      <h1 class="title">燕雲十六聲 夢回花深處俠境報名清單</h1>
      <p class="subtitle">目前進行測試中</p>
      <div class="chips">
        <span class="chip">一隊最多10人</span>
        <span class="chip">每隊至少2個治療</span>
      </div>
    </section>

    <div class="toolbar">
      <div class="toolbar-actions">
        <button class="btn-ghost" id="refreshBtn">整理日期</button>
      </div>
    </div>

    <div class="days" id="days"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      collection,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD3NalXMRjiag_26-g82UtxeDvuSjydg30",
      authDomain: "pve-ab4a8.firebaseapp.com",
      projectId: "pve-ab4a8",
      storageBucket: "pve-ab4a8.firebasestorage.app",
      messagingSenderId: "292971877558",
      appId: "1:292971877558:web:69b8ed8f70987847a44217",
      measurementId: "G-ESW46GLEV2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CONFIG = {
      daysToShow: 5,
      maxPeople: 10,
      minHealer: 2,
      weekdayTimes: ["19:45","20:30","21:30","00:00"],
      weekendTimes: ["14:00","16:00","18:00","21:30"],
      roles: ["輸出","承傷","治療"],
      collectionName: "schedule"
    };

    let globalData = {};
    let isRendering = false;

    function getTodayStart(){
      const d = new Date();
      d.setHours(0,0,0,0);
      return d;
    }

    function addDays(date, n){
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    function pad(n){
      return String(n).padStart(2, "0");
    }

    function formatDate(date){
      return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
    }

    function displayDate(date){
      return `${date.getMonth()+1}/${date.getDate()}`;
    }

    function weekdayText(date){
      return ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][date.getDay()];
    }

    function isWeekend(date){
      return date.getDay() === 0 || date.getDay() === 6;
    }

    function getDefaultTimesForDate(date){
      return isWeekend(date) ? [...CONFIG.weekendTimes] : [...CONFIG.weekdayTimes];
    }

    function getDatesToShow(){
      const today = getTodayStart();
      return Array.from({length: CONFIG.daysToShow}, (_, i) => addDays(today, i));
    }

    function sortSlots(slots){
      slots.sort((a,b) => {
        if(a.time === b.time) return (a.instance || 1) - (b.instance || 1);
        return a.time.localeCompare(b.time);
      });
    }

    function countRole(members, role){
      return members.filter(m => m.role === role).length;
    }

    function getAllowedRoles(members){
      const healerCount = countRole(members, "治療");
      const remaining = CONFIG.maxPeople - members.length;

      if(remaining <= 2 && healerCount < CONFIG.minHealer){
        return ["治療"];
      }
      return [...CONFIG.roles];
    }

    function getStatus(members){
      if(members.length >= CONFIG.maxPeople){
        return { text: "已滿", cls: "status-full" };
      }
      if(countRole(members, "治療") < CONFIG.minHealer){
        return { text: "治療不足", cls: "status-warn" };
      }
      return { text: "配置達標", cls: "status-ok" };
    }

    function roleClass(role){
      if(role === "輸出") return "role-dps";
      if(role === "承傷") return "role-tank";
      return "role-heal";
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function promptForSignup(allowedRoles){
      const name = prompt("請輸入角色名稱 / 玩家名稱");
      if(name === null) return null;

      const trimmedName = name.trim();
      if(!trimmedName){
        alert("名字不可留空。");
        return null;
      }

      const role = prompt(`請輸入職業：${allowedRoles.join(" / ")}`, allowedRoles[0]);
      if(role === null) return null;

      const trimmedRole = role.trim();
      if(!allowedRoles.includes(trimmedRole)){
        alert(`目前只能選：${allowedRoles.join("、")}`);
        return null;
      }

      return { name: trimmedName, role: trimmedRole };
    }

    function buildDefaultDayData(dateObj){
      const slots = [];
      const defaultTimes = getDefaultTimesForDate(dateObj);

      defaultTimes.forEach(time => {
        slots.push({
          time,
          instance: 1,
          members: [],
          isCustom: false
        });
      });

      if(!isWeekend(dateObj)){
        slots.push({
          time: "19:45",
          instance: 2,
          members: [],
          isCustom: false
        });
      }

      sortSlots(slots);
      return { slots };
    }

    async function ensureDateDoc(dateKey, dateObj){
      const ref = doc(db, CONFIG.collectionName, dateKey);
      const snap = await getDoc(ref);

      if(!snap.exists()){
        await setDoc(ref, buildDefaultDayData(dateObj));
      } else {
        const data = snap.data();
        if(!data.slots || !Array.isArray(data.slots)){
          await setDoc(ref, buildDefaultDayData(dateObj));
        } else {
          let changed = false;
          data.slots = data.slots.map(slot => {
            if(typeof slot.isCustom === "undefined"){
              changed = true;
              return { ...slot, isCustom: false };
            }
            return slot;
          });
          if(changed){
            await setDoc(ref, data);
          }
        }
      }
    }

    async function initializeVisibleDates(){
      const dates = getDatesToShow();
      for(const dateObj of dates){
        await ensureDateDoc(formatDate(dateObj), dateObj);
      }
    }

    function autoCreateNextSameTimeSlot(dayData, time){
      const sameTimeSlots = dayData.slots.filter(s => s.time === time);
      const hasOpenSlot = sameTimeSlots.some(s => (s.members || []).length < CONFIG.maxPeople);

      if(!hasOpenSlot){
        const maxInstance = sameTimeSlots.reduce((max, s) => Math.max(max, s.instance || 1), 1);
        dayData.slots.push({
          time,
          instance: maxInstance + 1,
          members: [],
          isCustom: true
        });
        sortSlots(dayData.slots);
      }
    }

    async function addMember(dateKey, slotIndex){
      const dayData = structuredClone(globalData[dateKey]);
      if(!dayData || !Array.isArray(dayData.slots)) return;

      const slot = dayData.slots[slotIndex];
      if(!slot) return;

      slot.members = Array.isArray(slot.members) ? slot.members : [];

      if(slot.members.length >= CONFIG.maxPeople){
        alert("此時段已滿。");
        autoCreateNextSameTimeSlot(dayData, slot.time);
        await setDoc(doc(db, CONFIG.collectionName, dateKey), dayData);
        return;
      }

      const allowedRoles = getAllowedRoles(slot.members);
      const entry = promptForSignup(allowedRoles);
      if(!entry) return;

      slot.members.push(entry);

      if(slot.members.length >= CONFIG.maxPeople){
        autoCreateNextSameTimeSlot(dayData, slot.time);
      }

      await setDoc(doc(db, CONFIG.collectionName, dateKey), dayData);
    }

    async function addCustomTime(dateKey){
      const dayData = structuredClone(globalData[dateKey]);
      if(!dayData || !Array.isArray(dayData.slots)) return;

      const time = prompt("請輸入新時間（格式例如 19:45）");
      if(time === null) return;

      const trimmed = time.trim();
      if(!/^\d{1,2}:\d{2}$/.test(trimmed)){
        alert("時間格式不正確，請用 HH:MM，例如 19:45");
        return;
      }

      const [h, m] = trimmed.split(":").map(Number);
      if(h < 0 || h > 23 || m < 0 || m > 59){
        alert("時間格式不正確。");
        return;
      }

      const sameTimeSlots = dayData.slots.filter(s => s.time === trimmed);
      const nextInstance = sameTimeSlots.length
        ? Math.max(...sameTimeSlots.map(s => s.instance || 1)) + 1
        : 1;

      dayData.slots.push({
        time: trimmed,
        instance: nextInstance,
        members: [],
        isCustom: true
      });

      sortSlots(dayData.slots);
      await setDoc(doc(db, CONFIG.collectionName, dateKey), dayData);
    }

    async function removeMember(dateKey, slotIndex, memberIndex){
      const dayData = structuredClone(globalData[dateKey]);
      if(!dayData || !Array.isArray(dayData.slots)) return;
      if(!dayData.slots[slotIndex]) return;

      const members = Array.isArray(dayData.slots[slotIndex].members)
        ? dayData.slots[slotIndex].members
        : [];

      const member = members[memberIndex];
      if(!member) return;

      const ok = confirm(`確定要刪除報名玩家「${member.name}」嗎？`);
      if(!ok) return;

      members.splice(memberIndex, 1);
      dayData.slots[slotIndex].members = members;

      await setDoc(doc(db, CONFIG.collectionName, dateKey), dayData);
    }

    async function deleteCustomSlot(dateKey, slotIndex){
      const dayData = structuredClone(globalData[dateKey]);
      if(!dayData || !Array.isArray(dayData.slots)) return;
      const slot = dayData.slots[slotIndex];
      if(!slot) return;

      if(!slot.isCustom){
        alert("固定時間段不能刪除。");
        return;
      }

      const members = Array.isArray(slot.members) ? slot.members : [];
      if(members.length > 0){
        alert("這個時間段已有報名，不能刪除。");
        return;
      }

      dayData.slots.splice(slotIndex, 1);
      sortSlots(dayData.slots);
      await setDoc(doc(db, CONFIG.collectionName, dateKey), dayData);
    }

    function render(){
      if(isRendering) return;
      isRendering = true;

      const dates = getDatesToShow();
      const daysEl = document.getElementById("days");
      let html = "";

      dates.forEach(date => {
        const dateKey = formatDate(date);
        const dayData = globalData[dateKey];
        const modeText = isWeekend(date) ? "週末時間表" : "平日時間表";

        html += `
          <section class="day-card">
            <div class="day-head">
              <h2 class="day-title">${displayDate(date)}</h2>
              <div class="day-sub">${weekdayText(date)}｜${modeText}</div>
              <div class="day-actions">
                <button class="btn-ghost" data-action="add-time" data-date="${dateKey}">＋ 新增時間</button>
              </div>
            </div>
            <div class="slot-list">
        `;

        if(dayData && Array.isArray(dayData.slots)){
          dayData.slots.forEach((slot, slotIndex) => {
            const members = Array.isArray(slot.members) ? slot.members : [];
            const dpsCount = countRole(members, "輸出");
            const tankCount = countRole(members, "承傷");
            const healCount = countRole(members, "治療");
            const status = getStatus(members);
            const allowedRoles = getAllowedRoles(members);
            const forceHeal = allowedRoles.length === 1 && allowedRoles[0] === "治療";
            const canDeleteCustomSlot = !!slot.isCustom && members.length === 0;

            const slotCardClass = members.length >= CONFIG.maxPeople
              ? "slot-card full-team"
              : members.length > 0
                ? "slot-card has-members"
                : "slot-card";

            html += `
              <div class="${slotCardClass}">
                <div class="slot-top">
                  <div>
                    <div class="slot-time">${slot.time}</div>
                    <div class="slot-instance">
                      第 ${slot.instance || 1} 隊
                      ${slot.isCustom ? "｜自訂" : "｜固定"}
                    </div>
                  </div>
                  <div class="slot-badges">
                    <span class="badge">${members.length}/${CONFIG.maxPeople}</span>
                    <span class="badge ${status.cls}">
                      ${forceHeal && members.length < CONFIG.maxPeople ? "最後位置保留治療" : status.text}
                    </span>
                  </div>
                </div>

                <div class="summary">
                  <span class="summary-pill">輸出 <strong>${dpsCount}</strong></span>
                  <span class="summary-pill">承傷 <strong>${tankCount}</strong></span>
                  <span class="summary-pill">治療 <strong>${healCount}</strong></span>
                </div>

                <div class="member-list">
            `;

            if(members.length === 0){
              html += `<div class="empty-note">尚未有人報名</div>`;
            } else {
              members.forEach((member, memberIndex) => {
                html += `
                  <div class="member">
                    <div class="member-left">
                      <span class="role-badge ${roleClass(member.role)}">${member.role}</span>
                      <span class="member-name">${escapeHtml(member.name)}</span>
                    </div>
                    <button class="remove-btn" data-action="remove-member" data-date="${dateKey}" data-slot="${slotIndex}" data-member="${memberIndex}">刪除</button>
                  </div>
                `;
              });
            }

            html += `
                </div>

                <div class="slot-actions">
                  <button class="add-btn" data-action="add-member" data-date="${dateKey}" data-slot="${slotIndex}" ${members.length >= CONFIG.maxPeople ? "disabled" : ""}>
                    ${members.length >= CONFIG.maxPeople ? "此隊已滿" : forceHeal ? "＋ 僅限新增治療" : "＋ 新增報名"}
                  </button>
                  ${slot.isCustom ? `
                    <button class="delete-slot-btn" data-action="delete-slot" data-date="${dateKey}" data-slot="${slotIndex}" ${canDeleteCustomSlot ? "" : "disabled"}>
                      刪除時間
                    </button>
                  ` : ``}
                </div>
              </div>
            `;
          });
        }

        html += `
            </div>
          </section>
        `;
      });

      daysEl.innerHTML = html;
      bindActions();
      isRendering = false;
    }

    function bindActions(){
      document.querySelectorAll('[data-action="add-time"]').forEach(btn => {
        btn.onclick = () => addCustomTime(btn.dataset.date);
      });

      document.querySelectorAll('[data-action="add-member"]').forEach(btn => {
        btn.onclick = () => addMember(btn.dataset.date, Number(btn.dataset.slot));
      });

      document.querySelectorAll('[data-action="remove-member"]').forEach(btn => {
        btn.onclick = () => removeMember(
          btn.dataset.date,
          Number(btn.dataset.slot),
          Number(btn.dataset.member)
        );
      });

      document.querySelectorAll('[data-action="delete-slot"]').forEach(btn => {
        btn.onclick = () => deleteCustomSlot(
          btn.dataset.date,
          Number(btn.dataset.slot)
        );
      });
    }

    document.getElementById("refreshBtn").onclick = async () => {
      await initializeVisibleDates();
      alert("日期已整理完成。");
    };

    onSnapshot(collection(db, CONFIG.collectionName), async (snapshot) => {
      const nextData = {};
      snapshot.forEach(item => {
        const data = item.data();
        if(data && Array.isArray(data.slots)){
          sortSlots(data.slots);
          nextData[item.id] = data;
        }
      });
      globalData = nextData;

      const dates = getDatesToShow();
      let missing = false;
      for(const dateObj of dates){
        const key = formatDate(dateObj);
        if(!globalData[key]){
          missing = true;
          break;
        }
      }

      if(missing){
        await initializeVisibleDates();
        return;
      }

      render();
    });

    await initializeVisibleDates();
    render();
  </script>
</body>
</html>
