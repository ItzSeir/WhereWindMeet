<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>夢回花深處｜江湖回憶錄</title>

  <style>
    /* 接入主站顏色系統 */
    :root{
      --bg:#0b1020;
      --bg2:#131c35;
      --panel:rgba(255,255,255,.08);
      --panel-strong:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.12);
      --text:#eef2ff;
      --muted:#a8b3cf;
      --accent:#6ea8ff;
      --accent2:#8b5cf6;
      --gold:#ffd76a;
      --shadow:0 18px 40px rgba(0,0,0,.28);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      overflow-x:hidden;
    }

    /* 共享背景光暈 */
    .bg-orb{
      position:fixed;
      border-radius:50%;
      filter:blur(70px);
      opacity:.28;
      pointer-events:none;
      z-index:0;
      animation:floatOrb 10s ease-in-out infinite;
    }
    .orb1{ width:300px; height:300px; background:rgba(110,168,255,.2); top:10%; left:-5%; }
    .orb2{ width:400px; height:400px; background:rgba(139,92,246,.15); bottom:10%; right:-5%; }
    @keyframes floatOrb{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-20px);} }

    .container{
      position:relative;
      z-index:1;
      max-width:1200px;
      margin:0 auto;
      padding:24px 14px 60px;
    }

    /* 頂部導航 (與首頁一致) */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:30px;
    }
    .brand-badge{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      font-size:13px;
      font-weight:700;
      backdrop-filter:blur(12px);
    }
    .nav a{
      text-decoration:none;
      color:var(--text);
      padding:10px 18px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      font-size:14px;
      font-weight:700;
      transition:.2s;
    }
    .nav a:hover{ background:rgba(255,255,255,.15); }

    /* 頁面標題區 */
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header p { color: var(--muted); font-size: 14px; }

    /* 相簿過濾器 */
    .gallery-filter {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* 瀑布流相簿牆 */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      grid-auto-rows: 200px;
      gap: 20px;
    }

    .gallery-item {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--panel);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: pointer;
    }

    /* 模擬瀑布流高度 */
    .gallery-item.v-2 { grid-row: span 2; }
    .gallery-item.v-1 { grid-row: span 1.5; }

    .gallery-item:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .gallery-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s;
    }

    .gallery-item:hover .gallery-img {
      transform: scale(1.05);
      filter: brightness(0.7);
    }

    /* 懸停文字資訊 */
    .gallery-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(11,16,32,0.9), transparent);
      opacity: 0;
      transition: 0.3s;
    }

    .gallery-item:hover .gallery-info {
      opacity: 1;
    }

    .gallery-info .date {
      font-size: 11px;
      color: var(--gold);
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }

    .gallery-info .title {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    /* 回到首頁按鈕 */
    .back-home {
      display: block;
      width: fit-content;
      margin: 40px auto 0;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }
    .back-home:hover { color: var(--accent); }

    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
      .gallery-item.v-2, .gallery-item.v-1 { grid-row: span 1; height: 250px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">
    <div class="topbar">
      <div class="brand">
        <span class="brand-badge">夢回花深處</span>
        <span class="brand-badge">回憶相簿</span>
      </div>
      <div class="nav">
        <a href="index.html">返回首頁</a>
      </div>
    </div>

    <header class="page-header">
      <h1>江湖回憶錄</h1>
      <p>「江湖不一定要人很多，能一直並肩同行的人，才最難得。」</p>
    </header>

    <div class="gallery-filter">
      <div class="filter-btn active">全部</div>
      <div class="filter-btn">百業派對</div>
      <div class="filter-btn">行俠任務</div>
      <div class="filter-btn">風景合影</div>
    </div>

    <div class="gallery-grid">
      <div class="gallery-item v-2">
        <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=600" class="gallery-img" alt="Memory">
        <div class="gallery-info">
          <span class="date">2026.04.24</span>
          <span class="title">燕雲十六聲：江南聚首</span>
        </div>
      </div>

      <div class="gallery-item v-1">
        <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=600" class="gallery-img" alt="Memory">
        <div class="gallery-info">
          <span class="date">2026.04.20</span>
          <span class="title">百業大對抗：決戰夜</span>
        </div>
      </div>

      <div class="gallery-item v-1">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600" class="gallery-img" alt="Memory">
        <div class="gallery-info">
          <span class="date">2026.04.18</span>
          <span class="title">崑崙山巔的合影</span>
        </div>
      </div>

      <div class="gallery-item v-2">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=600" class="gallery-img" alt="Memory">
        <div class="gallery-info">
          <span class="date">2026.04.15</span>
          <span class="title">百業派對：美食與美酒</span>
        </div>
      </div>

      <div class="gallery-item v-1">
        <img src="https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=600" class="gallery-img" alt="Memory">
        <div class="gallery-info">
          <span class="date">2026.04.10</span>
          <span class="title">初探行俠任務</span>
        </div>
      </div>
    </div>

    <a href="index.html" class="back-home">← 返回百業首頁</a>
  </div>

  <script>
    // 簡單的 Filter 切換效果
    const btns = document.querySelectorAll('.filter-btn');
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
