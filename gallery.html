<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060914;
  --bg2:#101a33;
  --panel:rgba(255,255,255,.085);
  --panel2:rgba(255,255,255,.13);
  --line:rgba(255,255,255,.14);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
  --shadow:rgba(0,0,0,.45);
}

*{ box-sizing:border-box; }

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 10%, rgba(110,168,255,.22), transparent 28%),
    radial-gradient(circle at 85% 8%, rgba(139,92,246,.22), transparent 26%),
    radial-gradient(circle at 50% 70%, rgba(255,215,106,.08), transparent 32%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:120px;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.55), transparent 75%);
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(to bottom, transparent, rgba(6,9,20,.45));
  z-index:-1;
}

/* ===== 核心導航列 (同步江湖回憶錄風格) ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: .3s;
}

.topbar-content {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-group { display: flex; gap: 8px; }

.brand-badge {
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}

.brand-badge.sub { color: var(--muted); }

.nav { display: flex; gap: 8px; }

.nav a {
  text-decoration: none;
  color: var(--muted);
  padding: 8px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.25s ease;
}

.nav a.home-btn {
  color: #fff;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 4px 15px rgba(110,168,255,0.4);
  font-weight: 700;
}

.nav a.active:not(.home-btn) {
  color: #fff;
  background: rgba(255,255,255,0.12);
}

/* ===== 手機版精準適配 (同步江湖回憶錄 1:1 風格) ===== */
@media (max-width: 768px) {
  body { padding-top: 150px !important; }

  .topbar {
    top: 10px;
    height: auto;
    padding: 10px 16px;
    width: calc(100% - 20px);
    border-radius: 24px;
    z-index: 9999;
  }

  .topbar-content { flex-direction: column; gap: 8px; }

  /* 核心修正：移除 transform: scale 確保文字粗細(bold)與邊框不變細 */
  .brand-group { 
    justify-content: center; 
    transform: none !important; 
  }

  .nav {
    width: 100%;
    justify-content: flex-start;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 5px 0;
    gap: 4px;
  }
  .nav::-webkit-scrollbar { display: none; }

  /* 核心修正：強制統一按鈕內距、字體與粗細 */
  .nav a {
    padding: 6px 12px !important; /* 精確控制按鈕大小 */
    font-size: 11px !important; 
    font-weight: 700 !important; /* 確保加粗程度一致 */
    white-space: nowrap;
  }

  /* 確保首頁按鈕在手機上也不會因為漸層縮放而改變大小 */
  .nav a.home-btn {
    box-shadow: 0 2px 8px rgba(110,168,255,0.3);
    font-weight: 700 !important;
  }
}

/* ===== container ===== */
.container{
  max-width:1220px;
  margin:auto;
  padding:38px 20px 80px;
}

/* ===== hero ===== */
.page-header{
  position:relative;
  text-align:center;
  margin-bottom:42px;
  padding:34px 20px 26px;
}

.page-header::before{
  content:"";
  position:absolute;
  inset:0;
  max-width:760px;
  margin:auto;
  border-radius:32px;
  background:linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 25px 70px rgba(0,0,0,.18);
  z-index:-1;
}

.kicker{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 15px;
  margin-bottom:18px;
  border-radius:999px;
  color:var(--gold);
  background:rgba(255,215,106,.08);
  border:1px solid rgba(255,215,106,.18);
  font-size:12px;
  font-weight:800;
  letter-spacing:2px;
}

.kicker::before,
.kicker::after{
  content:"";
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 14px rgba(255,215,106,.8);
}

.page-title{
  font-size:clamp(34px, 6vw, 64px);
  line-height:1.08;
  font-weight:900;
  margin:0;
  background:linear-gradient(100deg, #fff 10%, #dce8ff 45%, var(--accent) 72%, var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:6px;
  text-shadow:0 18px 45px rgba(0,0,0,.25);
}

.page-subtitle{
  color:var(--muted);
  margin:16px auto 0;
  font-size:14px;
  letter-spacing:7px;
  text-transform:uppercase;
  opacity:.9;
}

.page-header::after{
  content:"";
  display:block;
  width:76px;
  height:3px;
  background:linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  margin:24px auto 0;
  border-radius:999px;
}

/* ===== filter ===== */
.filter{
  position:sticky;
  top:104px;
  z-index:500;
  margin:0 auto 44px;
  padding:10px;
  width:max-content;
  max-width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  border-radius:999px;
  background:rgba(7,11,25,.54);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 16px 42px rgba(0,0,0,.22);
}

.filter button{
  padding:12px 26px;
  border:1px solid rgba(255,255,255,.1);
  border-radius:999px;
  cursor:pointer;
  background:rgba(255,255,255,.045);
  color:var(--muted);
  font-size:14px;
  font-weight:800;
  transition:.32s cubic-bezier(.2,.8,.2,1);
}

.filter button:hover{
  color:#fff;
  transform:translateY(-2px);
  background:rgba(255,255,255,.1);
}

.filter .active{
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff;
  border-color:transparent;
  box-shadow:0 10px 26px rgba(110,168,255,.32);
}

/* ===== masonry grid ===== */
.grid{
  position:relative;
  width:100%;
  margin-top:20px;
  transition:height .6s ease;
}

.item{
  position:absolute;
  width:calc(33.333% - 14px);
  border-radius:24px;
  overflow:hidden;
  cursor:pointer;
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.045));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:
    0 20px 46px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.08);
  transition:
    transform .6s cubic-bezier(.4,0,.2,1),
    opacity .45s ease,
    filter .45s ease,
    box-shadow .35s ease;
}

.item::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:
    linear-gradient(120deg, rgba(255,255,255,.18), transparent 30%),
    linear-gradient(to top, rgba(5,8,18,.7), transparent 50%);
  opacity:.25;
  transition:.35s ease;
}

.item:hover{
  box-shadow:
    0 28px 70px rgba(0,0,0,.42),
    0 0 0 1px rgba(110,168,255,.18);
}

.item:hover::before{
  opacity:.45;
}

.item.hide{
  opacity:0;
  transform:scale(.82) translateY(40px) !important;
  pointer-events:none;
  filter:blur(5px);
}

.gallery-img{
  width:100%;
  height:auto;
  display:block;
  transition:transform .9s cubic-bezier(.2,.8,.2,1), filter .5s ease;
}

.item:hover .gallery-img{
  transform:scale(1.065);
  filter:saturate(1.08) contrast(1.04);
}

/* ===== hover info ===== */
.gallery-info{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  z-index:3;
  padding:44px 20px 22px;
  background:linear-gradient(to top, rgba(6,9,20,.94) 0%, rgba(6,9,20,.55) 48%, transparent 100%);
  opacity:0;
  transform:translateY(16px);
  transition:.35s ease;
}

.item:hover .gallery-info{
  opacity:1;
  transform:translateY(0);
}

.gallery-info .date{
  display:inline-flex;
  font-size:11px;
  color:var(--gold);
  margin-bottom:7px;
  font-weight:800;
  letter-spacing:1px;
}

.gallery-info .title{
  display:block;
  font-size:17px;
  font-weight:900;
  color:#fff;
  letter-spacing:.5px;
}

/* ===== lightbox ===== */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(4,7,16,.94);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:24px;
}

.lightbox.show{
  display:flex;
  animation:fadeIn .25s ease;
}

.lightbox-inner{
  max-width:1060px;
  width:92%;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.lightbox img{
  max-width:100%;
  max-height:74vh;
  margin:auto;
  object-fit:contain;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 25px 80px rgba(0,0,0,.5);
}

.lb-meta{
  background:linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.045));
  padding:24px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 18px 50px rgba(0,0,0,.25);
}

.lb-date{
  color:var(--gold);
  font-size:12px;
  font-weight:800;
  letter-spacing:1px;
}

.lb-title{
  font-size:24px;
  font-weight:900;
  margin:6px 0 8px;
}

.lb-desc{
  color:var(--muted);
  font-size:15px;
  line-height:1.8;
}

.arrow{
  position:absolute;
  top:50%;
  width:58px;
  height:58px;
  display:grid;
  place-items:center;
  font-size:54px;
  line-height:1;
  color:rgba(255,255,255,.52);
  cursor:pointer;
  transform:translateY(-50%);
  border-radius:50%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  transition:.25s ease;
  user-select:none;
}

.arrow:hover{
  color:#fff;
  background:linear-gradient(135deg, rgba(110,168,255,.28), rgba(139,92,246,.24));
  box-shadow:0 12px 34px rgba(0,0,0,.28);
}

.left{ left:24px; }
.right{ right:24px; }

.close-tip{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.45);
  font-size:12px;
  letter-spacing:1px;
}

/* ===== animations ===== */
@keyframes fadeIn{
  from{ opacity:0; }
  to{ opacity:1; }
}

@keyframes riseIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.page-header,
.filter,
.grid{
  animation:riseIn .7s ease both;
}

.filter{ animation-delay:.08s; }
.grid{ animation-delay:.14s; }

/* ===== responsive ===== */
@media (max-width:900px){
  body{
    padding-top:150px;
  }

  .topbar{
    border-radius:28px;
    align-items:flex-start;
  }

  .topbar-content{
    flex-direction:column;
    align-items:stretch;
    gap:12px;
  }

  .brand-group{
    justify-content:center;
  }

  .nav{
    justify-content:center;
    flex-wrap:wrap;
  }

  .filter{
    top:138px;
  }
}

@media (max-width:800px){
  .item{
    width:calc(50% - 10px);
  }

  .page-subtitle{
    letter-spacing:5px;
  }

  .arrow{
    width:48px;
    height:48px;
    font-size:44px;
  }

  .left{ left:10px; }
  .right{ right:10px; }
}

@media (max-width:560px){
  body{
    padding-top:168px;
  }

  .container{
    padding-left:14px;
    padding-right:14px;
  }

  .topbar{
    top:12px;
    width:calc(100% - 24px);
    padding:12px;
  }

  .brand-badge{
    font-size:11px;
    padding:6px 12px;
  }

  .nav a{
    font-size:12px;
    padding:8px 12px;
  }

  .page-header{
    margin-bottom:30px;
    padding:28px 14px 22px;
  }

  .page-title{
    letter-spacing:3px;
  }

  .page-subtitle{
    letter-spacing:4px;
    font-size:12px;
  }

  .filter{
    position:relative;
    top:auto;
    width:100%;
    border-radius:22px;
    flex-wrap:wrap;
    margin-bottom:30px;
  }

  .filter button{
    flex:1;
    min-width:96px;
    padding:11px 12px;
    font-size:13px;
  }

  .item{
    width:100%;
    border-radius:20px;
  }

  .gallery-info{
    opacity:1;
    transform:none;
  }

  .lightbox{
    padding:14px;
  }

  .lightbox-inner{
    width:100%;
  }

  .lightbox img{
    max-height:65vh;
  }

  .lb-meta{
    padding:18px;
  }

  .arrow{
    top:50%;
    bottom:auto;
    transform:translateY(-50%);
  }

  .left{ left:10px; }
  .right{ right:10px; }
}
</style>
</head>

<div class="lightbox" id="lightbox">
  <div class="arrow left" id="prev">‹</div>

  <div class="lightbox-inner">
    <img id="light-img" alt="">
    <div class="lb-meta">
      <div class="lb-date" id="lb-date"></div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-desc" id="lb-desc"></div>
    </div>
  </div>

  <div class="arrow right" id="next">›</div>
  <div class="close-tip">點擊空白處或按 ESC 關閉</div>
</div>

<script>
const grid = document.getElementById('grid');
const items = Array.from(document.querySelectorAll('.item'));

function getColumnCount(){
  if(window.innerWidth <= 560) return 1;
  if(window.innerWidth <= 800) return 2;
  return 3;
}

function layout(){
  const containerWidth = grid.offsetWidth;
  const cols = getColumnCount();
  const gutter = window.innerWidth <= 560 ? 16 : 20;
  const colWidth = (containerWidth - (gutter * (cols - 1))) / cols;

  const heights = Array(cols).fill(0);

  items.forEach(item => {
    if(item.classList.contains('hide')){
      item.style.opacity = '0';
      return;
    }

    item.style.opacity = '1';
    item.style.width = `${colWidth}px`;

    const col = heights.indexOf(Math.min(...heights));
    const x = col * (colWidth + gutter);
    const y = heights[col];

    item.style.transform = `translate(${x}px, ${y}px)`;
    heights[col] += item.offsetHeight + gutter;
  });

  grid.style.height = Math.max(...heights) + 'px';
}

/* filter */
document.querySelectorAll('.filter button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filterValue = btn.dataset.filter;

    items.forEach(item => {
      const shouldShow = filterValue === 'all' || item.dataset.category === filterValue;
      item.classList.toggle('hide', !shouldShow);
    });

    let timer = setInterval(layout, 45);
    setTimeout(() => clearInterval(timer), 650);
  });
});

/* lightbox */
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('light-img');
const lbTitle = document.getElementById('lb-title');
const lbDate = document.getElementById('lb-date');
const lbDesc = document.getElementById('lb-desc');
let currentIdx = 0;

function visibleItems(){
  return items.filter(item => !item.classList.contains('hide'));
}

function showLightbox(idx){
  const list = visibleItems();
  const target = list[idx];
  if(!target) return;

  const img = target.querySelector('img');

  lightImg.src = img.src;
  lightImg.alt = target.dataset.title || '';
  lbTitle.textContent = target.dataset.title || '';
  lbDate.textContent = target.dataset.date || '';
  lbDesc.textContent = target.dataset.desc || '這一刻，留給江湖慢慢回味。';
}

items.forEach(item => {
  item.addEventListener('click', () => {
    const list = visibleItems();
    currentIdx = list.indexOf(item);
    showLightbox(currentIdx);
    lightbox.classList.add('show');
    document.body.style.overflow = 'hidden';
  });
});

document.getElementById('next').addEventListener('click', e => {
  e.stopPropagation();
  const list = visibleItems();
  currentIdx = (currentIdx + 1) % list.length;
  showLightbox(currentIdx);
});

document.getElementById('prev').addEventListener('click', e => {
  e.stopPropagation();
  const list = visibleItems();
  currentIdx = (currentIdx - 1 + list.length) % list.length;
  showLightbox(currentIdx);
});

function closeLightbox(){
  lightbox.classList.remove('show');
  document.body.style.overflow = '';
}

lightbox.addEventListener('click', e => {
  if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
  if(!lightbox.classList.contains('show')) return;

  if(e.key === 'Escape') closeLightbox();

  if(e.key === 'ArrowRight'){
    const list = visibleItems();
    currentIdx = (currentIdx + 1) % list.length;
    showLightbox(currentIdx);
  }

  if(e.key === 'ArrowLeft'){
    const list = visibleItems();
    currentIdx = (currentIdx - 1 + list.length) % list.length;
    showLightbox(currentIdx);
  }
});

/* load / resize */
window.addEventListener('load', layout);
window.addEventListener('resize', () => {
  clearTimeout(window.__layoutTimer);
  window.__layoutTimer = setTimeout(layout, 120);
});

items.forEach(item => {
  const img = item.querySelector('img');

  if(img.complete){
    layout();
  }else{
    img.addEventListener('load', layout);
  }
});
</script>

</body>
</html>
