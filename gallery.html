```html
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜江湖回憶錄</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
}

/* ===== Base ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.15), transparent 30%),
    radial-gradient(circle at top right, rgba(139,92,246,.15), transparent 30%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:100px;
}

/* ===== Navbar ===== */
.topbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 40px);
  max-width:1100px;
  height:64px;
  display:flex;
  align-items:center;
  padding:0 16px;
  border-radius:999px;
  background:rgba(15,22,42,0.6);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  z-index:999;
}

.topbar-content{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand-badge{
  padding:6px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  font-size:12px;
  font-weight:700;
}

.nav{
  display:flex;
  gap:8px;
}

.nav a{
  text-decoration:none;
  color:var(--muted);
  padding:8px 16px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

.nav a.active{
  background:var(--accent);
  color:#fff;
}

/* ===== Container ===== */
.container{
  max-width:1200px;
  margin:0 auto 60px;
  padding:40px 24px;
  border-radius:28px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}

/* ===== Header ===== */
.page-header{
  text-align:center;
  margin-bottom:30px;
}

.page-header h1{
  font-size:38px;
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.page-header p{
  color:var(--muted);
  font-size:14px;
}

/* ===== Filter ===== */
.gallery-filter{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:30px;
}

.filter-btn{
  padding:8px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  cursor:pointer;
  font-size:13px;
}

.filter-btn.active{
  background:var(--accent);
  color:#fff;
}

/* ===== Gallery ===== */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.gallery-item{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--line);
  cursor:pointer;
  aspect-ratio:16/10;
  transition:.3s;
}

.gallery-item:hover{
  transform:translateY(-6px);
}

.gallery-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.gallery-info{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:16px;
  background:linear-gradient(to top,rgba(0,0,0,.75),transparent);
  opacity:0;
  transition:.3s;
}

.gallery-item:hover .gallery-info{
  opacity:1;
}

/* ===== Lightbox ===== */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lightbox img{
  max-width:90%;
  max-height:85%;
  border-radius:16px;
}

.lightbox.show{
  display:flex;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-badge">夢回花深處｜江湖回憶錄</div>
    <div class="nav">
      <a href="#">首頁</a>
      <a href="#" class="active">回憶錄</a>
    </div>
  </div>
</nav>

<!-- Main -->
<div class="container">

<header class="page-header">
  <h1>江湖回憶錄</h1>
  <p>那些並肩作戰與把酒言歡的瞬間</p>
</header>

<div class="gallery-filter">
  <div class="filter-btn active" data-filter="all">全部</div>
  <div class="filter-btn" data-filter="nye">跨年夜</div>
  <div class="filter-btn" data-filter="daily">日常</div>
</div>

<div class="gallery-grid">

  <div class="gallery-item" data-category="nye">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
    <div class="gallery-info">
      <span>2026.01.01</span>
      <b>跨年合照</b>
    </div>
  </div>

  <div class="gallery-item" data-category="daily">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%88%9E%E7%8D%85%EF%BC%8813Feb26%EF%BC%89.png" class="gallery-img">
    <div class="gallery-info">
      <span>2026.02.13</span>
      <b>夢回舞獅團</b>
    </div>
  </div>

  <div class="gallery-item" data-category="daily">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img">
    <div class="gallery-info">
      <span>2026.02.16</span>
      <b>搖滾歌手 @曲絡寧</b>
    </div>
  </div>

</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img src="" id="lightbox-img">
</div>

<script>

/* Filter */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const filter=btn.dataset.filter;

    document.querySelectorAll('.gallery-item').forEach(item=>{
      item.style.display = (filter==='all'||item.dataset.category===filter)
        ? 'block' : 'none';
    });
  };
});

/* Lightbox */
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('lightbox-img');

document.querySelectorAll('.gallery-img').forEach(img=>{
  img.onclick=()=>{
    lightbox.classList.add('show');
    lightImg.src = img.src;
  };
});

lightbox.onclick = () => {
  lightbox.classList.remove('show');
};

</script>

</body>
</html>
```
