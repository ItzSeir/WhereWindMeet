    <div class="item" data-category="daily" data-title="搖滾歌手 @曲絡寧" data-date="2026.02.16" data-desc="在花深處的音律之夜。">
      <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E6%90%96%E6%BB%BE%E6%AD%8C%E6%89%8B%20%40%E6%9B%B2%E7%B5%A1%E5%AF%A7.png" class="gallery-img" alt="搖滾歌手">
      <div class="gallery-info">
        <span class="date">2026.02.16</span>
        <span class="title">搖滾歌手 @曲絡寧</span>
      </div>
    </div>
  </div>
<div class="empty-state" id="emptyState">目前沒有符合條件的回憶。</div></div>

<div class="upload-modal" id="uploadModal"><div class="upload-card"><h2>上傳江湖回憶</h2><div class="upload-grid"><label>圖片<input id="uploadFile" type="file" accept="image/*"></label><label>標題<input id="uploadTitle" type="text" placeholder="例如：幫會合照"></label><label>日期<input id="uploadDate" type="date"></label><label>分類<select id="uploadCategory"><option value="group">同門合照</option><option value="daily">江湖日常</option></select></label><label>描述<textarea id="uploadDesc" placeholder="寫一點回憶描述..."></textarea></label></div><div class="upload-actions"><button class="upload-cancel" id="closeUpload" type="button">取消</button><button class="upload-submit" id="submitUpload" type="button">上傳</button></div><div class="upload-status" id="uploadStatus"></div></div></div>
<div class="lightbox" id="lightbox"><button class="close-btn" id="closeLightbox" type="button">×</button><div class="arrow left" id="prev">‹</div><div class="lightbox-inner"><div class="lightbox-image-panel"><img id="light-img" alt=""></div><aside class="lb-meta"><div class="lb-top"><div class="lb-category" id="lb-category"></div><div class="lb-date" id="lb-date"></div><h2 class="lb-title" id="lb-title"></h2><div class="lb-desc" id="lb-desc"></div></div><div class="lb-actions"><span class="lb-counter" id="lb-counter">1 / 1</span><span>ESC 關閉・左右鍵切換</span></div></aside></div><div class="arrow right" id="next">›</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================
   SUPABASE CONFIG
   Replace these 2 values
========================= */
const SUPABASE_URL = "https://ugipvbqcbrroiuhqqzjd.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaXB2YnFjYnJyb2l1aHFxempkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDE1MTUsImV4cCI6MjA5Nzg3NzUxNX0.1TPfk4OJfJDGkkowgbMG3ojS4unGt8dGfMucrzW0sr8";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUCKET_NAME = "gallery-images";

const nav=document.getElementById('floatingNav');
window.addEventListener('scroll',()=>{window.scrollY>50?nav.classList.add('scrolled'):nav.classList.remove('scrolled')},{passive:true});

const grid=document.getElementById('grid');
let items=Array.from(document.querySelectorAll('.item'));
const searchInput=document.getElementById('searchInput');
const clearSearch=document.getElementById('clearSearch');
const resultText=document.getElementById('resultText');
const activeFilterLabel=document.getElementById('activeFilterLabel');
const emptyState=document.getElementById('emptyState');
const labels={all:'全部回憶',group:'同門合照',daily:'江湖日常'};
let currentFilter='all';
let currentIdx=0;

function formatDateForDisplay(dateValue){
  if(!dateValue)return '';
  return String(dateValue).replaceAll('-','.');
}

function createGalleryItem(photo){
  const item=document.createElement('div');
  item.className='item';
  item.dataset.category=photo.category || 'daily';
  item.dataset.title=photo.title || '未命名回憶';
  item.dataset.date=formatDateForDisplay(photo.photo_date || photo.date || new Date().toISOString().slice(0,10));
  item.dataset.desc=photo.description || '這一刻，留給江湖慢慢回味。';
  item.innerHTML=`
    <img src="${photo.image_url}" class="gallery-img" alt="${item.dataset.title}">
    <div class="gallery-info">
      <span class="date">${item.dataset.date}</span>
      <span class="title">${item.dataset.title}</span>
    </div>
  `;
  grid.appendChild(item);
  prepareItem(item);
  return item;
}

function prepareItem(item){
  const oldPill=item.querySelector('.category-pill');
  if(oldPill)oldPill.remove();
  const cat=item.dataset.category;
  const pill=document.createElement('span');
  pill.className='category-pill '+cat;
  pill.textContent=labels[cat]||cat;
  item.appendChild(pill);

  const info=item.querySelector('.gallery-info');
  if(info&&!info.querySelector('.gallery-desc-preview')){
    const desc=document.createElement('div');
    desc.className='gallery-desc-preview';
    desc.textContent=item.dataset.desc||'這一刻，留給江湖慢慢回味。';
    info.appendChild(desc);
  }

  item.addEventListener('click',()=>{
    const list=visibleItems();
    currentIdx=list.indexOf(item);
    showLightbox(currentIdx);
    lightbox.classList.add('show');
    document.body.style.overflow='hidden';
  });

  const img=item.querySelector('img');
  if(img){
    if(img.complete)layout();
    else img.addEventListener('load',layout);
  }
}

function refreshItems(){
  items=Array.from(document.querySelectorAll('.item'));
  document.getElementById('totalCount').textContent=items.length;
  document.getElementById('groupCount').textContent=items.filter(i=>i.dataset.category==='group').length;
  document.getElementById('dailyCount').textContent=items.filter(i=>i.dataset.category==='daily').length;
}

async function loadSupabaseGallery(){
  if(SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON_PUBLIC_KEY')){
    refreshItems();
    items.forEach(prepareItem);
    applyFilters();
    layout();
    return;
  }

  const { data, error } = await supabaseClient
    .from('gallery')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    console.error(error);
    refreshItems();
    items.forEach(prepareItem);
    applyFilters();
    layout();
    return;
  }

  if(data && data.length){
    data.reverse().forEach(photo=>createGalleryItem(photo));
  }

  refreshItems();
  applyFilters();
  layout();
}

function getColumnCount(){if(window.innerWidth<=560)return 1;if(window.innerWidth<=800)return 2;return 3;}
function layout(){
  refreshItems();
  const visible=items.filter(item=>!item.classList.contains('hide'));
  const containerWidth=grid.offsetWidth;
  const cols=getColumnCount();
  const gutter=window.innerWidth<=560?16:20;
  const colWidth=(containerWidth-(gutter*(cols-1)))/cols;
  const heights=Array(cols).fill(0);
  visible.forEach(item=>{
    item.style.opacity='1';
    item.style.width=`${colWidth}px`;
    const col=heights.indexOf(Math.min(...heights));
    const x=col*(colWidth+gutter);
    const y=heights[col];
    item.style.transform=`translate(${x}px, ${y}px)`;
    heights[col]+=item.offsetHeight+gutter;
  });
  grid.style.height=visible.length?Math.max(...heights)+'px':'0px';
}

function applyFilters(){
  refreshItems();
  const q=searchInput.value.trim().toLowerCase();
  let shown=0;
  items.forEach(item=>{
    const catOK=currentFilter==='all'||item.dataset.category===currentFilter;
    const text=`${item.dataset.title||''} ${item.dataset.date||''} ${item.dataset.desc||''}`.toLowerCase();
    const searchOK=!q||text.includes(q);
    const show=catOK&&searchOK;
    item.classList.toggle('hide',!show);
    if(show)shown++;
  });
  activeFilterLabel.textContent=labels[currentFilter]||'全部回憶';
  resultText.textContent=q?`找到 ${shown} 個回憶`:`顯示 ${shown} 個回憶`;
  emptyState.classList.toggle('show',shown===0);
  let timer=setInterval(layout,45);
  setTimeout(()=>clearInterval(timer),620);
}

document.querySelectorAll('.filter button[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter button[data-filter]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    applyFilters();
  });
});
searchInput.addEventListener('input',applyFilters);
clearSearch.addEventListener('click',()=>{searchInput.value='';applyFilters();searchInput.focus();});

const lightbox=document.getElementById('lightbox'),lightImg=document.getElementById('light-img'),lbTitle=document.getElementById('lb-title'),lbDate=document.getElementById('lb-date'),lbDesc=document.getElementById('lb-desc'),lbCategory=document.getElementById('lb-category'),lbCounter=document.getElementById('lb-counter');
function visibleItems(){return items.filter(item=>!item.classList.contains('hide'));}
function showLightbox(idx){
  const list=visibleItems();
  const target=list[idx];
  if(!target)return;
  const img=target.querySelector('img');
  lightImg.src=img.src;
  lightImg.alt=target.dataset.title||'';
  lbTitle.textContent=target.dataset.title||'';
  lbDate.textContent=target.dataset.date||'';
  lbDesc.textContent=target.dataset.desc||'這一刻，留給江湖慢慢回味。';
  lbCategory.textContent=labels[target.dataset.category]||'';
  lbCounter.textContent=`${idx+1} / ${list.length}`;
}
function nextPhoto(){const list=visibleItems();if(!list.length)return;currentIdx=(currentIdx+1)%list.length;showLightbox(currentIdx);}
function prevPhoto(){const list=visibleItems();if(!list.length)return;currentIdx=(currentIdx-1+list.length)%list.length;showLightbox(currentIdx);}
document.getElementById('next').addEventListener('click',e=>{e.stopPropagation();nextPhoto();});
document.getElementById('prev').addEventListener('click',e=>{e.stopPropagation();prevPhoto();});
function closeLightbox(){lightbox.classList.remove('show');document.body.style.overflow='';}
document.getElementById('closeLightbox').addEventListener('click',closeLightbox);
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});
document.addEventListener('keydown',e=>{if(!lightbox.classList.contains('show'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowRight')nextPhoto();if(e.key==='ArrowLeft')prevPhoto();});

/* Upload modal */
const uploadModal=document.getElementById('uploadModal');
const openUpload=document.getElementById('openUpload');
const closeUpload=document.getElementById('closeUpload');
const submitUpload=document.getElementById('submitUpload');
const uploadStatus=document.getElementById('uploadStatus');
openUpload.addEventListener('click',()=>{uploadModal.classList.add('show');uploadStatus.textContent='';});
closeUpload.addEventListener('click',()=>uploadModal.classList.remove('show'));
uploadModal.addEventListener('click',e=>{if(e.target===uploadModal)uploadModal.classList.remove('show');});

document.getElementById('uploadDate').value=new Date().toISOString().slice(0,10);

submitUpload.addEventListener('click',async()=>{
  const file=document.getElementById('uploadFile').files[0];
  const title=document.getElementById('uploadTitle').value.trim();
  const photoDate=document.getElementById('uploadDate').value;
  const category=document.getElementById('uploadCategory').value;
  const description=document.getElementById('uploadDesc').value.trim();

  if(SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON_PUBLIC_KEY')){
    uploadStatus.textContent='請先填入 Supabase URL 和 anon key。';
    return;
  }
  if(!file){uploadStatus.textContent='請先選擇圖片。';return;}
  if(!title){uploadStatus.textContent='請填寫標題。';return;}

  submitUpload.disabled=true;
  uploadStatus.textContent='上傳中...';

  const ext=file.name.split('.').pop();
  const safeName=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const filePath=`uploads/${safeName}`;

  const { error: uploadError } = await supabaseClient.storage
    .from(BUCKET_NAME)
    .upload(filePath, file, { cacheControl:'3600', upsert:false });

  if(uploadError){
    console.error(uploadError);
    uploadStatus.textContent='圖片上傳失敗：' + uploadError.message;
    submitUpload.disabled=false;
    return;
  }

  const { data: publicData } = supabaseClient.storage
    .from(BUCKET_NAME)
    .getPublicUrl(filePath);

  const imageUrl=publicData.publicUrl;

  const { data: inserted, error: dbError } = await supabaseClient
    .from('gallery')
    .insert({
      title:title,
      category:category,
      description:description,
      image_url:imageUrl,
      image_path:filePath,
      photo_date:photoDate
    })
    .select()
    .single();

  if(dbError){
    console.error(dbError);
    uploadStatus.textContent='資料儲存失敗：' + dbError.message;
    submitUpload.disabled=false;
    return;
  }

  createGalleryItem(inserted);
  refreshItems();
  applyFilters();
  uploadStatus.textContent='上傳成功！';
  document.getElementById('uploadFile').value='';
  document.getElementById('uploadTitle').value='';
  document.getElementById('uploadDesc').value='';
  submitUpload.disabled=false;
  setTimeout(()=>uploadModal.classList.remove('show'),700);
});

window.addEventListener('load',loadSupabaseGallery);
window.addEventListener('resize',()=>{clearTimeout(window.__layoutTimer);window.__layoutTimer=setTimeout(layout,120);});
</script></body></html>
