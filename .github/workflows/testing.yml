name: Testing

on:
  schedule:
    # Daily
    - cron: "0 2 * * *"

    # 每個星期六 Weekly
    - cron: "0 7 * * 6"

  workflow_dispatch:
    inputs:
      mode:
        description: "選擇公告類型"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Firebase Admin
        run: npm install firebase-admin@latest

      - name: Show runner time
        shell: bash
        run: |
          echo "UTC time:"
          date -u

          echo "Malaysia time:"
          TZ=Asia/Kuala_Lumpur date

      - name: Determine announcement mode
        id: determine-mode
        shell: bash
        env:
          MANUAL_MODE: ${{ github.event.inputs.mode }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          echo "Event name: $GITHUB_EVENT_NAME"
          echo "Schedule cron: $SCHEDULE_CRON"
          echo "Manual mode: $MANUAL_MODE"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_MODE="${MANUAL_MODE:-daily}"

          elif [ "$SCHEDULE_CRON" = "0 7 * * 6" ]; then
            RUN_MODE="weekly"

          elif [ "$SCHEDULE_CRON" = "0 2 * * *" ]; then
            RUN_MODE="daily"

          else
            echo "Unknown trigger. Defaulting to daily."
            RUN_MODE="daily"
          fi

          echo "Selected mode: $RUN_MODE"
          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"

      - name: Verify JavaScript file
        shell: bash
        run: |
          echo "Current commit:"
          git rev-parse HEAD

          echo ""
          echo "First 60 lines of testing.js:"
          sed -n '1,60p' .github/scripts/testing.js

          echo ""
          echo "Checking for old Firebase syntax:"

          if grep -nE 'const admin = require|admin\.credential|admin\.firestore|admin\.initializeApp' .github/scripts/testing.js; then
            echo ""
            echo "ERROR: Old Firebase Admin syntax still exists."
            exit 1
          else
            echo "No old Firebase Admin syntax found."
          fi

          echo ""
          echo "Checking new Firebase syntax:"

          grep -nE 'firebase-admin/app|firebase-admin/firestore|initializeApp|cert|getFirestore' .github/scripts/testing.js

      - name: Send Discord announcement
        run: node .github/scripts/testing.js
        env:
          RUN_MODE: ${{ steps.determine-mode.outputs.run_mode }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          DISCORD_WEBHOOK2: ${{ secrets.DISCORD_WEBHOOK2 }}
