name: Daily Recruitment Summary

on:
  schedule:
    # 每天馬來西亞時間中午 12:07
    # Malaysia UTC+8 → UTC 04:07
    # 避開整點，降低 GitHub Actions 排程延遲機會
    - cron: "7 2 * * *"

    # 每個星期六馬來西亞時間晚上 7:07
    # Malaysia UTC+8 → UTC 11:07
    - cron: "7 7 * * 6"

  workflow_dispatch:
    inputs:
      mode:
        description: "選擇公告類型"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Show current time
        shell: bash
        run: |
          echo "UTC time:"
          date -u

          echo "Malaysia time:"
          TZ=Asia/Kuala_Lumpur date

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Determine announcement mode
        id: determine-mode
        shell: bash
        env:
          MANUAL_MODE: ${{ github.event.inputs.mode }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          echo "Event name: $GITHUB_EVENT_NAME"
          echo "Schedule cron: $SCHEDULE_CRON"
          echo "Manual mode: $MANUAL_MODE"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_MODE="${MANUAL_MODE:-daily}"

          elif [ "$SCHEDULE_CRON" = "7 7 * * 6" ]; then
            RUN_MODE="weekly"

          elif [ "$SCHEDULE_CRON" = "7 2 * * *" ]; then
            RUN_MODE="daily"

          else
            echo "Unknown trigger. Defaulting to daily."
            RUN_MODE="daily"
          fi

          echo "Selected mode: $RUN_MODE"
          echo "run_mode=$RUN_MODE" >> "$GITHUB_OUTPUT"

      - name: Send Discord announcement
        run: node .github/scripts/post-discord.js
        env:
          RUN_MODE: ${{ steps.determine-mode.outputs.run_mode }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
