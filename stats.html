<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜數據與脈絡</title>

<meta name="view-transition" content="same-origin" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

<style>
:root {
  --bg: #040812;
  --bg2: #0b1120;
  --panel: rgba(255, 255, 255, 0.05);
  --line: rgba(255, 255, 255, 0.1);
  --text: #eef2ff;
  --muted: #a8b3cf;
  --accent: #4facfe;
  --gold: #ffd76a;
  /* 世代配色 */
  --gen1: #1e40af; --gen2: #0891b2; --gen3: #7c3aed; --gen4: #db2777; --gen5: #ea580c;
}

body {
  margin: 0; font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg); color: var(--text);
  padding-top: 110px; min-height: 100vh;
}

/* ===== 還原 Navbar ===== */
.topbar {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 1100px; height: 64px; z-index: 1000;
  display: flex; align-items: center; padding: 0 12px; border-radius: 999px;
  background: rgba(15, 22, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--line);
}
.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.brand-group { display: flex; gap: 8px; cursor: pointer; }
.brand-badge { padding: 6px 14px; border-radius: 999px; background: rgba(255,255,255,0.06); font-size: 12px; font-weight: 700; }
.nav { display: flex; gap: 8px; }
.nav a { text-decoration: none; color: var(--muted); padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; transition: 0.3s; }
.nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
.nav a.home-btn { color: #fff; background: linear-gradient(135deg, var(--accent), #8b5cf6); }

/* ===== 內容區 ===== */
.container { max-width: 1300px; margin: auto; padding: 0 20px; }
.page-header { text-align: center; margin-bottom: 40px; }
.page-title { font-size: 36px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* ===== 數據網格 ===== */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; padding: 24px; }
.stat-card.full { grid-column: span 3; padding: 0; position: relative; height: 700px; overflow: hidden; }
.stat-title { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 15px; display: block; }
.stat-value { font-size: 36px; font-weight: 800; }

/* ===== Network Graph 設計 ===== */
#cy { width: 100%; height: 100%; background: radial-gradient(circle at center, #0b1426 0%, #040812 100%); }
.graph-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
.legend { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px solid var(--line); backdrop-filter: blur(10px); }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #ccc; margin-bottom: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }

</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group" onclick="location.href='index.html'">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge">實時數據</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">江湖數據</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">幫會數據與師徒脈絡</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-title">幫會成員數</span>
      <div class="stat-value">62 <small style="font-size: 14px; color:var(--muted)">/ 100</small></div>
      <p style="color:var(--muted); font-size: 13px; margin-top: 10px;">活躍狀態：<span style="color:#10b981">極高 (S)</span></p>
    </div>

    <div class="stat-card">
      <span class="stat-title">等級梯隊</span>
      <div style="display: flex; flex-direction: column; gap: 8px; font-size: 14px;">
        <div style="display:flex; justify-content:space-between;"><span>宗師級 (100+)</span><span style="color:var(--gold)">12人</span></div>
        <div style="display:flex; justify-content:space-between;"><span>精英級 (90-99)</span><span style="color:var(--gold)">35人</span></div>
        <div style="display:flex; justify-content:space-between;"><span>中堅級 (80-89)</span><span style="color:var(--gold)">15人</span></div>
      </div>
    </div>

    <div class="stat-card">
      <span class="stat-title">領地解鎖進度</span>
      <div class="stat-value" style="color:var(--accent)">85%</div>
      <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-top:15px;">
        <div style="width:85%; height:100%; background:var(--accent); border-radius:2px;"></div>
      </div>
    </div>

    <div class="stat-card full">
      <div class="graph-overlay">
        <span class="stat-title" style="margin: 20px;">江湖脈絡傳承星圖</span>
      </div>
      
      <div id="cy"></div>

      <div class="legend">
        <div class="legend-item"><span class="dot" style="background:var(--gen1)"></span> 第一代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen2)"></span> 第二代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen3)"></span> 第三代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen4)"></span> 第四代</div>
        <div class="legend-item"><span class="dot" style="background:var(--gen5)"></span> 第五代</div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const cy = cytoscape({
    container: document.getElementById('cy'),
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(id)',
          'color': '#fff',
          'font-size': '10px',
          'text-valign': 'center',
          'text-halign': 'center',
          'background-color': '#1e293b',
          'border-width': 1,
          'border-color': 'rgba(255,255,255,0.2)',
          'shape': 'round-rectangle',
          'width': '65px',
          'height': '24px',
          'overlay-opacity': 0
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': 'rgba(255,255,255,0.15)',
          'curve-style': 'straight', // 改為直線
          'target-arrow-shape': 'vee',
          'target-arrow-color': 'rgba(255,255,255,0.15)',
          'arrow-scale': 0.8,
          'opacity': 0.6
        }
      },
      /* 世代色彩應用 */
      { selector: '.g1', style: { 'background-color': '#1e40af', 'width': '75px', 'height': '28px' } },
      { selector: '.g2', style: { 'background-color': '#0891b2' } },
      { selector: '.g3', style: { 'background-color': '#7c3aed' } },
      { selector: '.g4', style: { 'background-color': '#db2777' } },
      { selector: '.g5', style: { 'background-color': '#ea580c' } },
      
      { selector: 'node:hover', style: { 'border-color': '#fff', 'border-width': 2 } },
      { selector: 'edge:hover', style: { 'line-color': '#4facfe', 'width': 3, 'opacity': 1 } }
    ],
    elements: [
      /* 核心數據節點 */
      { data: { id: '姜澈' }, classes: 'g1' },
      { data: { id: '芝士漢堡' }, classes: 'g1' },
      { data: { id: '楚小閣' }, classes: 'g1' },
      { data: { id: '鯨滿' }, classes: 'g1' },
      { data: { id: '白雲凌' }, classes: 'g1' },
      { data: { id: '蘋' }, classes: 'g1' },
      { data: { id: '乖乖' }, classes: 'g1' },

      { data: { id: '花臻茵' }, classes: 'g2' }, { data: { source: '姜澈', target: '花臻茵' } },
      { data: { id: '曲絡寧' }, classes: 'g2' }, { data: { source: '花臻茵', target: '曲絡寧' } },
      { data: { id: '似水' }, classes: 'g3' }, { data: { source: '花臻茵', target: '似水' } },
      { data: { id: '白離' }, classes: 'g3' }, { data: { source: '曲絡寧', target: '白離' } },
      { data: { id: '酥酥不酥' }, classes: 'g4' }, { data: { source: '似水', target: '酥酥不酥' } },
      { data: { id: '青葉' }, classes: 'g4' }, { data: { source: '似水', target: '青葉' } },
      { data: { id: '沐雨橙風' }, classes: 'g4' }, { data: { source: '白離', target: '沐雨橙風' } },
      { data: { id: '雨宮天' }, classes: 'g4' }, { data: { source: '白離', target: '雨宮天' } },
      { data: { id: '多多' }, classes: 'g5' }, { data: { source: '青葉', target: '多多' } },
      { data: { id: '少音' }, classes: 'g5' }, { data: { source: '青葉', target: '少音' } },
      { data: { id: '染冉' }, classes: 'g5' }, { data: { source: '沐雨橙風', target: '染冉' } },

      { data: { id: '顧立舟' }, classes: 'g2' }, { data: { source: '芝士漢堡', target: '顧立舟' } },
      { data: { id: '羽玄' }, classes: 'g3' }, { data: { source: '顧立舟', target: '羽玄' } },
      { data: { source: '乖乖', target: '羽玄' } },
      { data: { id: '稚米' }, classes: 'g2' }, { data: { source: '楚小閣', target: '稚米' } },
      { data: { id: '姬蕭遙' }, classes: 'g2' }, { data: { source: '鯨滿', target: '姬蕭遙' } },
      { data: { id: '無名' }, classes: 'g2' }, { data: { source: '白雲凌', target: '無名' } }
    ],
    layout: {
      name: 'cose',
      padding: 60,
      nodeRepulsion: 12000,
      idealEdgeLength: 100,
      animate: true
    }
  });
});

// 頁面切換
document.querySelectorAll('a').forEach(link => {
  link.onclick = (e) => {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && document.startViewTransition) {
      e.preventDefault();
      document.startViewTransition(() => { location.href = href; });
    }
  };
});
</script>

</body>
</html>
