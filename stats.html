<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜幫會數據庫</title>

<meta name="view-transition" content="same-origin" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.1);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;
  /* 師徒世代配色 - 嚴格遵循圖片 */
  --gen1: #1e40af; /* 深藍 */
  --gen2: #3b82f6; /* 亮藍 */
  --gen3: #8b5cf6; /* 紫色 */
  --gen4: #ec4899; /* 粉紅 */
  --gen5: #f97316; /* 橙色 */
}

/* ===== 基礎設定 ===== */
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.12), transparent 30%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  padding-top:110px;
  min-height: 100vh;
}

/* ===== Navbar (統一設計) ===== */
.topbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 64px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 999px;
  background: rgba(15, 22, 42, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  view-transition-name: main-nav;
}

.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.brand-group { display: flex; gap: 8px; cursor: pointer; }
.brand-badge { padding: 6px 14px; border-radius: 999px; background: rgba(255,255,255,0.06); font-size: 12px; font-weight: 700; }
.nav { display: flex; gap: 8px; }
.nav a { text-decoration: none; color: var(--muted); padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; transition: 0.3s; }
.nav a.active { color: #fff; background: rgba(255,255,255,0.12); }
.nav a.home-btn { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }

/* ===== 內容區域 ===== */
.container { max-width: 1200px; margin: auto; padding: 20px; }

.page-header { text-align: center; margin-bottom: 40px; }
.page-title { font-size: 36px; font-weight: 800; margin: 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* ===== Pinterest 數據網格 ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.stat-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 30px;
  transition: transform 0.3s ease;
}

.stat-card.wide { grid-column: span 2; }
.stat-card.full { grid-column: span 3; }

.stat-header { margin-bottom: 25px; }
.stat-title { font-size: 18px; font-weight: 700; color: var(--accent); display: block; margin-bottom: 5px;}

/* 數據顯示樣式 */
.stat-main-value { font-size: 40px; font-weight: 800; color: #fff; margin: 10px 0; }

/* 進度條 */
.progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin: 15px 0; }
.progress-fill { height: 100%; background: var(--accent); transition: width 1s ease; }

/* ===== 師徒脈絡關係圖 (Pinterest 風格整合) ===== */
.lineage-container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.lineage-branch {
  flex: 1;
  min-width: 250px;
  background: rgba(255,255,255,0.02);
  border-radius: 20px;
  padding: 20px;
  border-left: 2px solid var(--line);
}

.node-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  font-size: 14px;
  position: relative;
  transition: 0.2s;
}
.node-item:hover { transform: translateX(5px); }

.node-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

/* 深度縮進與色彩控制 */
.node-d1 { padding-left: 0; color: var(--gen1); font-weight: 700; }
.node-d2 { padding-left: 15px; color: var(--gen2); }
.node-d3 { padding-left: 30px; color: var(--gen3); }
.node-d4 { padding-left: 45px; color: var(--gen4); }
.node-d5 { padding-left: 60px; color: var(--gen5); }

/* 響應式優化 */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: 1fr; }
  .stat-card.wide, .stat-card.full { grid-column: span 1; }
}

</style>
</head>

<body>

<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group" onclick="location.href='index.html'">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖統計</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">實時數據</a>
    </div>
  </div>
</nav>

<div class="container">
  <header class="page-header">
    <h1 class="page-title">數據統計與師徒傳承</h1>
    <p style="color: var(--muted); margin-top:10px; letter-spacing: 2px;">REAL-TIME DATA & LINEAGE RELATIONSHIP</p>
  </header>

  <div class="stats-grid">
    
    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-title">當前成員數</span>
      </div>
      <div class="stat-main-value">62 <small style="font-size: 16px; color:var(--muted)">/ 100</small></div>
      <div class="progress-bar"><div class="progress-fill" style="width: 62%;"></div></div>
      <p style="font-size: 13px; color: var(--muted);">幫會活躍評級：<span style="color:var(--gold)">極高 (S)</span></p>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-title">成員等級分布</span>
      </div>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div style="display:flex; justify-content:space-between;"><span>宗師級 (100+)</span><span style="color:var(--gold)">12 人</span></div>
        <div style="display:flex; justify-content:space-between;"><span>精英級 (90-99)</span><span style="color:var(--gold)">35 人</span></div>
        <div style="display:flex; justify-content:space-between;"><span>中堅級 (80-89)</span><span style="color:var(--gold)">15 人</span></div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-title">幫會領地進度</span>
      </div>
      <div class="stat-main-value" style="color: var(--accent2);">85%</div>
      <div class="progress-bar"><div class="progress-fill" style="width: 85%; background: var(--accent2);"></div></div>
      <p style="font-size: 13px; color: var(--muted);">已解鎖：<span style="color:#fff">高階俠境區域</span></p>
    </div>

    <div class="stat-card full">
      <div class="stat-header">
        <span class="stat-title">江湖脈絡傳承 (師徒關係圖集)</span>
      </div>
      
      <div class="lineage-container">
        
        <div class="lineage-branch">
          <div class="node-item node-d1"><span class="node-dot" style="background:var(--gen1)"></span> 姜澈</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 花臻茵</div>
          <div class="node-item node-d3"><span class="node-dot" style="background:var(--gen3)"></span> 似水</div>
          <div class="node-item node-d4"><span class="node-dot" style="background:var(--gen4)"></span> 酥酥不酥</div>
          <div class="node-item node-d4"><span class="node-dot" style="background:var(--gen4)"></span> 青葉</div>
          <div class="node-item node-d5"><span class="node-dot" style="background:var(--gen5)"></span> 多多</div>
          <div class="node-item node-d5"><span class="node-dot" style="background:var(--gen5)"></span> 少音</div>
        </div>

        <div class="lineage-branch">
          <div class="node-item node-d1"><span class="node-dot" style="background:var(--gen1)"></span> 楚小閣</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 稚米</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 楚蕭</div>
        </div>

        <div class="lineage-branch">
          <div class="node-item node-d1"><span class="node-dot" style="background:var(--gen1)"></span> 芝士漢堡</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 顧立舟</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 葉染塵</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 一杯豆漿</div>
        </div>

        <div class="lineage-branch">
          <div class="node-item node-d1"><span class="node-dot" style="background:var(--gen1)"></span> 鯨滿</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 姬蕭遙</div>
        </div>

        <div class="lineage-branch">
          <div class="node-item node-d1"><span class="node-dot" style="background:var(--gen1)"></span> 白雲凌</div>
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 無名</div>
        </div>

        <div class="lineage-branch">
          <div class="node-item node-d2"><span class="node-dot" style="background:var(--gen2)"></span> 曲絡寧</div>
          <div class="node-item node-d3"><span class="node-dot" style="background:var(--gen3)"></span> 白離</div>
          <div class="node-item node-d4"><span class="node-dot" style="background:var(--gen4)"></span> 沐雨橙風</div>
          <div class="node-item node-d4"><span class="node-dot" style="background:var(--gen4)"></span> 雨宮天</div>
          <div class="node-item node-d5"><span class="node-dot" style="background:var(--gen5)"></span> 染冉</div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
// 跨頁面切換動畫腳本
document.querySelectorAll('a').forEach(link => {
  link.onclick = (e) => {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && document.startViewTransition) {
      e.preventDefault();
      document.startViewTransition(() => {
        location.href = href;
      });
    }
  };
});

// 啟動進度條動畫
window.addEventListener('load', () => {
  document.querySelectorAll('.progress-fill').forEach(bar => {
    const w = bar.style.width;
    bar.style.width = '0%';
    setTimeout(() => bar.style.width = w, 200);
  });
});
</script>

</body>
</html>
