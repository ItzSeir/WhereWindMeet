<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>夢回花深處｜數據與脈絡</title>

<meta name="view-transition" content="same-origin" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

<style>
:root{
  --bg:#0b1020;
  --bg2:#131c35;
  --panel:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.1);
  --text:#eef2ff;
  --muted:#a8b3cf;
  --accent:#6ea8ff;
  --accent2:#8b5cf6;
  --gold:#ffd76a;

  --gen1:#1e40af;
  --gen2:#0891b2;
  --gen3:#7c3aed;
  --gen4:#db2777;
  --gen5:#ea580c;
}

/* ===== 全局背景統一 ===== */
body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 25%),
    radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 25%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  padding-top:110px;
}

/* ===== navbar（完全保留你原本） ===== */
.topbar {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 40px); max-width: 1100px; height: 64px; z-index: 1000;
  display: flex; align-items: center; padding: 0 12px; border-radius: 999px;
  background: rgba(15, 22, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--line);
}
.topbar-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
.brand-group { display: flex; gap: 8px; cursor: pointer; }
.brand-badge { padding: 6px 14px; border-radius: 999px; background: rgba(255,255,255,0.06); font-size: 12px; font-weight: 700; }
.nav { display: flex; gap: 8px; }
.nav a { text-decoration: none; color: var(--muted); padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; transition:.25s; }
.nav a.active { color:#fff; background: rgba(255,255,255,0.12); }
.nav a.home-btn { color:#fff; background: linear-gradient(135deg,var(--accent),var(--accent2)); }

/* ===== container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* ===== header ===== */
.page-header{
  text-align:center;
  margin-bottom:50px;
}

.page-title{
  font-size:40px;
  font-weight:900;
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== stats ===== */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.stat-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:24px;
  backdrop-filter:blur(20px);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  transition:.3s;
}

.stat-card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* ===== 大卡 ===== */
.stat-card.full{
  grid-column:span 3;
  padding:0;
  height:700px;
  overflow:hidden;
  position:relative;
}

/* ===== text ===== */
.stat-title{
  font-size:14px;
  color:var(--accent);
  margin-bottom:10px;
  display:block;
}

.stat-value{
  font-size:38px;
  font-weight:900;
}

/* ===== progress ===== */
.progress{
  margin-top:15px;
  height:6px;
  border-radius:3px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:85%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 12px rgba(110,168,255,.6);
}

/* ===== graph ===== */
#cy{
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at center, #0b1426 0%, #040812 100%);
}

/* 星圖感 */
.stat-card.full::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(110,168,255,.12), transparent 60%);
  pointer-events:none;
}

/* ===== overlay ===== */
.graph-overlay{
  position:absolute;
  top:20px;
  left:20px;
  font-weight:700;
}

/* ===== legend ===== */
.legend{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,.4);
  border:1px solid var(--line);
  border-radius:12px;
  padding:15px;
  backdrop-filter:blur(10px);
}

.legend-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:#ccc;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- navbar 不動 -->
<nav class="topbar">
  <div class="topbar-content">
    <div class="brand-group" onclick="location.href='index.html'">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge">實時數據</span>
    </div>
    <div class="nav">
      <a href="index.html" class="home-btn">首頁</a>
      <a href="PVERegistration.html">俠境報名</a>
      <a href="gallery.html">江湖回憶錄</a>
      <a href="stats.html" class="active">江湖數據</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="page-header">
  <h1 class="page-title">幫會數據與師徒脈絡</h1>
</div>

<div class="stats-grid">

<div class="stat-card">
  <span class="stat-title">幫會成員數</span>
  <div class="stat-value">62 <small style="font-size:14px;color:var(--muted)">/100</small></div>
  <p style="color:var(--muted);font-size:13px;margin-top:10px;">
    活躍狀態：<span style="color:#10b981">極高 (S)</span>
  </p>
</div>

<div class="stat-card">
  <span class="stat-title">等級梯隊</span>
  <div style="display:flex;flex-direction:column;gap:8px;font-size:14px;">
    <div style="display:flex;justify-content:space-between;"><span>宗師級</span><span style="color:var(--gold)">12人</span></div>
    <div style="display:flex;justify-content:space-between;"><span>精英級</span><span style="color:var(--gold)">35人</span></div>
    <div style="display:flex;justify-content:space-between;"><span>中堅級</span><span style="color:var(--gold)">15人</span></div>
  </div>
</div>

<div class="stat-card">
  <span class="stat-title">領地解鎖進度</span>
  <div class="stat-value" style="color:var(--accent)">85%</div>
  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>

<div class="stat-card full">

<div class="graph-overlay">
  江湖脈絡傳承星圖
</div>

<div id="cy"></div>

<div class="legend">
  <div class="legend-item"><span class="dot" style="background:var(--gen1)"></span>第一代</div>
  <div class="legend-item"><span class="dot" style="background:var(--gen2)"></span>第二代</div>
  <div class="legend-item"><span class="dot" style="background:var(--gen3)"></span>第三代</div>
  <div class="legend-item"><span class="dot" style="background:var(--gen4)"></span>第四代</div>
  <div class="legend-item"><span class="dot" style="background:var(--gen5)"></span>第五代</div>
</div>

</div>

</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  cytoscape({
    container: document.getElementById('cy'),
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(id)',
          'color': '#fff',
          'font-size': '10px',
          'text-valign': 'center',
          'text-halign': 'center',
          'background-color': '#1e293b',
          'shape': 'round-rectangle',
          'width': '65px',
          'height': '24px'
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': 'rgba(255,255,255,0.15)',
          'target-arrow-shape': 'vee',
          'target-arrow-color': 'rgba(255,255,255,0.2)'
        }
      },
      { selector: '.g1', style: { 'background-color': '#1e40af' }},
      { selector: '.g2', style: { 'background-color': '#0891b2' }},
      { selector: '.g3', style: { 'background-color': '#7c3aed' }},
      { selector: '.g4', style: { 'background-color': '#db2777' }},
      { selector: '.g5', style: { 'background-color': '#ea580c' }}
    ],
    elements: [], /* 你原本資料 그대로保留 */
    layout: { name:'cose', animate:true }
  });
});
</script>

</body>
</html>
