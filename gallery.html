<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>夢回花深處｜江湖回憶錄</title>

  <!-- 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b1020;
      --bg2:#131c35;
      --panel:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#eef2ff;
      --muted:#a8b3cf;
      --accent:#6ea8ff;
      --accent2:#8b5cf6;
      --gold:#ffd76a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding-top:100px;
      font-family:"Noto Sans TC", system-ui;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,255,.18), transparent 26%),
        radial-gradient(circle at top right, rgba(139,92,246,.16), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    /* ===== 統一 Navbar 樣式 ===== */
    .topbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 1100px;
      height: 64px;
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(15, 22, 42, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: .3s;
    }

    .topbar.scrolled {
      top: 10px;
      background: rgba(10,15,30,0.85);
    }

    .topbar-content {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-group {
      display: flex;
      gap: 8px;
    }

    .brand-badge {
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      font-weight: 700;
    }

.brand-badge.sub { 
  color: var(--muted) !important; 
}
    
    .nav { display: flex; gap: 8px; }

    .nav a {
      text-decoration: none;
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .nav a:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    .nav a.home-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 4px 15px rgba(110,168,255,0.4);
      font-weight: 700;
    }

    .nav a.active:not(.home-btn) {
      color: #fff;
      background: rgba(255,255,255,0.12);
    }

    /* 調整主容器頂部間距以適應固定導航 */
    body { padding-top: 100px; }

/* ===== 手機版精準適配 (同步江湖回憶錄 1:1 風格) ===== */
@media (max-width: 768px) {
  body { padding-top: 150px !important; }

  .topbar {
    top: 10px;
    height: auto;
    padding: 10px 16px;
    width: calc(100% - 20px);
    border-radius: 24px;
    z-index: 9999;
  }

  .topbar-content { flex-direction: column; gap: 8px; }

  /* 核心修正：移除 transform: scale 確保文字粗細(bold)與邊框不變細 */
  .brand-group { 
    justify-content: center; 
    transform: none !important; 
  }

  .nav {
    width: 100%;
    justify-content: flex-start;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 5px 0;
    gap: 4px;
  }
  .nav::-webkit-scrollbar { display: none; }

  /* 核心修正：強制統一按鈕內距、字體與粗細 */
  .nav a {
    padding: 6px 12px !important; /* 精確控制按鈕大小 */
    font-size: 11px !important; 
    font-weight: 700 !important; /* 確保加粗程度一致 */
    white-space: nowrap;
  }

  /* 確保首頁按鈕在手機上也不會因為漸層縮放而改變大小 */
  .nav a.home-btn {
    box-shadow: 0 2px 8px rgba(110,168,255,0.3);
    font-weight: 700 !important;
  }
}

    /* ===== Container ===== */
    .container{
      max-width:1200px;
      margin:0 auto 60px;
      padding:40px 24px 60px;
      border-radius:32px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
    }
@media (max-width: 768px) {
  .nav {
    justify-content: flex-start;
    overflow-x: auto; /* 開啟左右滑動 */
    -webkit-overflow-scrolling: touch; /* 滑動順暢度 */
    padding: 5px 0;
    width: 100%;
  }
  /* 隱藏滑動條但保持功能 */
  .nav::-webkit-scrollbar {
    display: none;
  }
}
    /* ===== Header ===== */
    .page-header{
      text-align:center;
      margin-bottom:40px;
    }

    .page-header h1{
      font-size:40px;
      font-weight:800;
      background:linear-gradient(90deg,#fff,var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .page-header p{
      color:var(--muted);
      font-size:14px;
    }

    /* ===== Filter ===== */
    .gallery-filter{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .filter-btn{
      padding:8px 20px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      cursor:pointer;
    }

    .filter-btn.active{
      background:var(--accent);
      color:#fff;
    }

    /* ===== Gallery ===== */
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      grid-auto-rows:200px;
      gap:20px;
    }

    .gallery-item{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      border:1px solid var(--line);
      cursor:pointer;
      transition:.3s;
    }

    .gallery-item.v-2{ grid-row:span 2; }

    .gallery-item:hover{
      transform:translateY(-6px);
      box-shadow:0 15px 30px rgba(0,0,0,0.4);
    }

    .gallery-img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .gallery-info{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      padding:20px;
      background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
      opacity:0;
      transition:.3s;
    }

    .gallery-item:hover .gallery-info{
      opacity:1;
    }

    .gallery-info .date{
      font-size:12px;
      color:var(--gold);
    }

    .gallery-info .title{
      font-size:16px;
      font-weight:700;
    }

    .back-home{
      display:block;
      text-align:center;
      margin-top:40px;
      color:var(--muted);
      text-decoration:none;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="topbar" id="floatingNav">
  <div class="topbar-content">

    <div class="brand-group">
      <span class="brand-badge">夢回花深處</span>
      <span class="brand-badge sub">江湖回憶錄</span>
    </div>

    <div class="nav">
      <a href="index" class="home-btn">首頁</a>
      <a href="PVERegistration">俠境報名</a>
      <a href="gallery">江湖回憶錄</a>
    </div>

  </div>
</nav>

<div class="container">

  <header class="page-header">
    <h1>江湖回憶錄</h1>
    <p>那些並肩作戰與把酒言歡的瞬間，都值得被妥善收藏。</p>
  </header>

<div class="gallery-filter">
  <div class="filter-btn active" data-filter="all">全部</div>
  <div class="filter-btn" data-filter="cross">跨年夜</div>
  <div class="filter-btn" data-filter="event">其他活動</div>
</div>

<div class="gallery-grid">
  <div class="gallery-item v-2" data-category="cross">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
    <div class="gallery-info">
      <span class="date">2026.01.01</span>
      <span class="title">跨年合照</span>
    </div>
  </div>

  <div class="gallery-item" data-category="quest">
    <img src="https://raw.githubusercontent.com/ItzSeir/WhereWindMeet/main/%E7%9B%B8%E7%89%87/%E8%B7%A8%E5%B9%B42025-2026.png" class="gallery-img">
    <div class="gallery-info">
      <span class="date">2026.04.20</span>
      <span class="title">行俠任務截圖</span>
    </div>
  </div>
</div>

</div>

<script>
/* Navbar scroll */
const nav = document.getElementById('floatingNav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 50);
});

/* Active 自動 */
const links = document.querySelectorAll('.nav a');
const current = window.location.pathname.split("/").pop();
links.forEach(link=>{
  if(link.getAttribute("href")===current){
    link.classList.add("active");
  }
});

/* Filter UI */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>

</body>
</html>
